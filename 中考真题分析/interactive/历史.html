<style>
:root{--bg:#f6f7f9;--fg:#1c2128;--mut:#5b6470;--line:#e5e8ec;--card:#fff;--c:#7d6608}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--fg:#e6edf3;--mut:#9aa4b0;--line:#222a33;--card:#161b22}}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg)}
.wrap{max-width:1320px;margin:0 auto;padding:14px}
a.back{color:var(--c);text-decoration:none;font-size:14px}
h1{font-size:20px;margin:.3em 0 .1em}
.hint{color:var(--mut);font-size:13px;margin:.2em 0 .6em}
/* 左右分栏联动：左散点图、右详情面板，同屏并排，hover 即时出题、零滚动 */
.stage{display:flex;gap:14px;align-items:stretch}
.left{flex:0.95;min-width:0;display:flex;flex-direction:column}
#plot{width:100%;height:calc(100vh - 200px);min-height:420px;background:var(--card);border:1px solid var(--line);border-radius:12px}
#detail{flex:1.5;min-width:420px;max-width:840px;height:calc(100vh - 200px);min-height:420px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--c);border-radius:12px;padding:14px;position:sticky;top:12px;display:flex;flex-direction:column;overflow:hidden}
#detail .meta{font-size:13px;color:var(--mut);margin-bottom:6px}
#detail .kps{margin-bottom:8px}
.qbox{flex:1;min-height:0;overflow:auto;border-radius:8px}      /* 题目在面板内部滚动，整页不动 */
.qbox .q{font-size:15px;line-height:1.7;white-space:pre-wrap}
.qimg{max-width:100%;height:auto;display:block;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:zoom-in}
.ph{color:var(--mut)}
@media(max-width:860px){                                          /* 窄屏退化为上下堆叠 */
  .stage{display:block}
  #plot{height:56vh}
  #detail{height:auto;max-width:none;position:static;margin-top:12px;display:block}
  .qbox{height:44vh}
}
/* 点击截图放大的浮窗 */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;z-index:60;overflow:auto;padding:28px}
.lb.open{display:flex}
#lbimg{max-width:min(98vw,1200px);height:auto;background:#fff;border-radius:8px;box-shadow:0 10px 50px rgba(0,0,0,.6);cursor:zoom-out;margin:auto}
.lb-x{position:fixed;top:14px;right:18px;background:#fff;color:#111;border:0;border-radius:20px;padding:6px 15px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:61}
.kp{display:inline-block;background:color-mix(in srgb,var(--c) 14%,transparent);color:var(--c);border-radius:10px;padding:1px 8px;font-size:12.5px;margin:2px 3px 0 0}

撰写史书，继任太史令后，用十多年的时间写出了不朽的历史巨著《史记》。 ——摘编自《中国历史·七年级上册》 材料二：梁启超，广东新会人。自幼聪明好学，有“神童”之誉。11岁中秀才，16岁中举人，18岁入万木草堂，跟康有为学习。公车上书后，到上海任《时务报》主笔……25岁时，到长沙主讲时务学堂。 ——摘自《中国历史·八年级上册》 材料三：达尔文22岁时，受“小猎犬号”船长的邀请，以博物学家的身份随船进行了近5年的环球航行。船长本来希望达尔文能够找到科学证据来验证《圣经》的记载，没想到旅行结束后，达尔文却得出了相反的结论。 ——摘自《世界历史·九年级下册》 材料四：在漫漫历史长河中，人类社会青年英雄辈出，中华民族青年英雄辈出……列宁最初参加革命活动时只有17岁。牛顿和莱布尼茨发现微积分时分别是22岁和28岁……中共一大召开时毛泽东是28岁，周恩来参加中国共产党时是23岁，邓小平参加旅欧中国少年共产党时是18岁……航天报国的嫦娥团队、神舟团队平均年龄是33岁，北斗团队平均年龄是35岁。 ——摘自习近平《在纪念五四运动100周年大会上的讲义》\n（1）根据材料一并结合所学知识，指出“他”是谁？《史记》在中国史学方面有怎样的地位？&amp;#10;&amp;#10;\n（2）根据材料二并结合所学知识，指出“公车上书”发生的直接原因是什么？任《时务报》主笔时期，梁启超大力宣传了什么思想？同一时期在北方宣传这一思想最有影响的是什么报纸？&amp;#10;&amp;#10;\n（3）根据材料三并结合所学知识，指出人类历史上首次完成“环球航行”的是哪支船队？“相反的结论”后来发现为生物科学领域的哪一理论？该理论得到完整的阐述是在达尔文的哪一著作中？&amp;#10;&amp;#10;\n（4）根据材料四并结合所学知识，指出“五四运动”的导火线是什么？这次运动有什么历史意义？“毛泽东28岁”是公元哪一年？2003年10月，乘坐神舟飞船升入太空并成功返回地面的航天员是谁？&amp;#10; &amp;#10;\n（5）综合上述四则材料，谈谈新时代青少年为现中国梦可以做怎样的努力？&amp;#10;&amp;#10;", "历史_2019_31.jpg"], [2019, "32", "材料分析题", "中", "宋元海上丝绸之路指南针、第二次工业革命、两极格局、战后日本经济崛起、信息技术", "32．“科技是国之利器，国家赖之以强，企业赖之以赢，人民生活赖之以好。”阅读材料，结合所学知识回答问题。 材料一：宋元时期造船和航海技术有了较大的发展……当时，海上交通发达，海外贸易繁荣。宋代的海路形成了多条航线……元朝时，海上交通范围有更大的拓展，海上丝绸之路进入鼎盛时期。 ——摘自《中国历史·七年级下册》 材料二：瑞典人诺贝尔发明了现代炸药，后来又研制出无烟炸药。到1896年，他的公司分布于二十个国家，年产值约值一亿瑞典克朗。他致力于和平运动，认为“只要从技术方面使炸药的威力发挥到最高峰，炸药本身便能抑止战争。”但是，炸药却造成更大的战争伤亡。根据他的遗嘱，诺贝尔的大部分财产被用来设立一个奖励基金，每年授予“为人类作出杰出贡献的人”，这就是诺贝尔奖。 ——改编自南方网《阿尔弗雷德·诺贝尔的生平》 材料三：战后国际形势的演变给日本的经济发展提供了良好的机遇。20年纪50年代后期和60年代，日本大力发展重化工业，把培养中级技术人才作为教育发展的重点，同时以购买专利为主来引进新兴技术；70年代以后，日本产业结构从资本密集型的重化工业转向知识密集型产业，政府又把培养能自主开发新技术的高级人才和熟练运用新兴技术的中级人才作为教育的重点，同时以引进尖端技术为主。 ——摘编自人教版《世界历史·九年级下册教师教学用书》 材料四：2019年2月，中国互联网信息中心在北京发布了第43次《中国互联网发展状况统计报告》。（数据截至2018年12月）\n（1）根据材料一并结合所学知识，指出宋代海路航线最远到达哪里？宋朝为管理海外贸易设置了什么机构？北宋末年，中国的海船上开始使用哪一项新的科技发明？这项发明对世界产生了怎样的影响？\n（2）材料二中诺贝尔的发明属于哪一新兴工业部门的成果？举出同时期的另一项重要发明。\n（3）根据材料三并结合所学知识，指出“战后国际形势的演变”形成了哪一政治格局？根据材料三，分析二战后日本经济迅速发展的原因有哪些？\n（4）从材料四的图1中，你可以得到什么信息？根据材料四中的表1并结合所学知识，指出我们在使用互联网时应注意哪些问题？\n（5）综合上述四则材料并结合所学知识，谈谈你对科技的认识。", "历史_2019_32.jpg"], [2019, "33", "小论文", "难", "启蒙运动法国大革命、共产党宣言马克思主义、李大钊传播马克思主义", "33．“新时代催生新思想，新思想引领新时代、指导新实践。”阅读材料，结合所学知识回答问题。&amp;#10;&amp;#10; 材料一：法国的社会秩序以及人民的思想都被牢牢控制在专制政权和天主教会的手里。与之相对的是，资产阶级的力量逐渐壮大起来，他们想要在政治、经济和文化方面冲破桎梏和枷锁……一场在人类历史中占有重要地位的思想和文化革命爆发了。这一革命运动从思想和理论上为之后的大革命做好了准备。在这场革命中，法国的社会面貌被彻底改变了。 ——摘编自（英）乔治·威尔斯、[美]卡尔顿·海斯（全国通史） 材料二：辛亥革命没有完成实现民族独立、人民解放的历史任务。中国先进分子从马克思列宁主义的科学真理中看到了解决中国问题的出路。中国共产党成立以来……团结带领人民历经千难万险，付出巨大牺牲，赢得新民主主义革命胜利，开展社会主义革命和社会主义建设，进行改革开放新的革命和社会主义现代化建设……创造了一个又一个彪炳史册的人间奇迹，迎来了中华民族伟大复兴的光明前景。 ——摘编自《习近平新时代中国特色社会主义思想三十讲》\n（1）根据材料一，指出“思想和文化革命”、“大革命”分别是什么历史事件？根据材料二并结合所学知识，指出马克思主义诞生的标志是什么？在中华大地上第一次高高举起马克思主义旗帜的人是谁？&amp;#10;&amp;#10;\n（2）结合所学知识，从材料一，二中提取信息，自拟一个论题并展开论述。要求：观点明确，史论结合，论证充分。&amp;#10;&amp;#10; 答案解析部分", "历史_2019_33.jpg"], [2020, "6", "选择题", "中", "丝绸之路、隋朝大运河", "6．“张公出，丝路兴，文明传。……大业（年号）始，东都建，运河开。”材料中的“丝路”与“运河”都促进了（ ）\n　　A． 南北交通的发展\n　　B． 经济和文化的交流\n　　C． 经济重心的南移\n　　D． 西汉的大一统", "历史_2020_6.jpg"], [2020, "14", "选择题", "中", "重庆谈判", "14．1945年8月29日《大公报》社评：“毛泽东先生来了!……大家都认为这是中国的一件大喜事。”为了争取和平，与蒋介石共商国是，社评中毛泽东到访的地点是（ ）\n　　A． 重庆\n　　B． 南京\n　　C． 北平\n　　D． 西安", "历史_2020_14.jpg"], [2020, "16", "选择题", "中", "新时期外交布局", "16．“大国是关键，周边是首要，发展中国家是基础，多边是重要舞台。”这反映出中国特色大国外交的总布局是（ ）\n　　A． 独立自主的和平外交\n　　B． 和平共处\n　　C． 求同存异\n　　D． 全方位、多层次、立体化", "历史_2020_16.jpg"], [2020, "21", "选择题", "中", "牛顿万有引力", "21．作为近代科学的奠基人之一，他除了在光学、力学和数学方面有开创性研究之外，还发现了一个宇宙定律，这个定律是揭开天体运行面纱的轰动性、革命性结论。这位科学家是（ ）\n　　A． 达尔文\n　　B． 牛顿\n　　C． 瓦特\n　　D． 诺贝尔", "历史_2020_21.jpg"], [2020, "26", "选择题", "中", "凡尔赛条约、凡尔赛华盛顿体系", "26．20世纪前期，国际社会签订了一个重要条约来调和法德矛盾，以确保地区和平。但20年后世界大战再次爆发，证明其最终失效。这一条约是（ ）\n　　A． 《凡尔赛条约》\n　　B． 《九国公约》\n　　C． 《开罗宣言》\n　　D． 《联合国家宣言》", "历史_2020_26.jpg"], [2020, "27", "选择题", "中", "新经济政策", "27．1921年苏维埃政府将原定征收的年度粮食税额下调至\n2.4亿普特（重量单位），受到农民热烈欢迎。这主要是因为（ ）\n　　A． 《和平法令》的颁布\n　　B． 斯大林模式的形成\n　　C． 新经济政策的实施\n　　D． 戈尔巴乔夫的改革", "历史_2020_27.jpg"], [2020, "28", "选择题", "中", "经济大危机", "28．1929年10月开始，美国股市在一个月内持续滑坡，约300亿美元市值蒸发殆尽，大批银行倒闭，公司破产，商品价格暴跌。出现这些现象的原因是（ ）\n　　A． 一战的爆发\n　　B． 冷战的开始\n　　C． 经济大危机\n　　D． 罗斯福新政", "历史_2020_28.jpg"], [2020, "31", "材料分析题", "中", "北魏孝文帝改革、辛亥革命、第一次工业革命、日本明治维新", "31．服饰作为社会文化的符号，它的变化折射出人类社会的政治变革、经济变化和风尚变迁。阅读材料，回答问题。&amp;#10;&amp;#10; 材料一：（孝文帝）又引见王公卿士，责留京之官曰：“昨望见妇女之服，仍为夹领小袖（少数民族旧俗）。……卿等何为而违前诏？” ﹣﹣《魏书》卷二十一上《献文六王•咸阳王禧传》 材料二：民国元年，迁到北京不久的民国临时政府和参议院颁发了第一个正式的服饰法令，即《服制》。……使洋服正式步入中国人的生活……革命党人正是以法国大革命、美国独立战争为榜样，以西方政体为摹本。因此，民初服饰的西化是历史的必然，也从此改变了中国服饰传统的历史轨迹。 ﹣﹣﹣摘编自《光明日报》2014年5月14日 材料三：18世纪以前，英国的棉织品质地低劣，竞争不过印度、中国的棉织品。当时穿着中印棉布衣服的风尚风靡一时。为了促进本国纺织业的发展，1700年英国议会通过法令，禁止从印度、中国和伊朗输入染色的棉纺织品……英国只有采用新技术才能在国际市场上同印度、中国的产品竞争。正是这个商品竞争的需要，才推动了一系列新发明，进而引发了工业革命。 ﹣﹣摘自刘祚昌、光仁洪、韩承文主编《世界通史》 材料四：如图这幅艺术作品描绘的是日本明治维新时期民众生活的一个场景。 请回答：\n（1）根据材料一并结合所学知识，指出孝文帝是哪一民族的统治者。留京官员违背了他的哪项诏令？孝文帝坚持推行改革起到了什么作用？&amp;#10;&amp;#10;\n（2）根据材料二并结合所学知识，分析服饰法令的颁发与哪次革命存在关联。此后，民国时期服饰出现了什么变化？“以西方政体为摹本”，中国建立了什么政体？&amp;#10;&amp;#10;\n（3）根据材料三并结合所学知识，指出工业革命最早从哪一行业开始。列举两个工业革命中的新发明。从材料中归纳英国促进该行业发展的方法。&amp;#10;&amp;#10;\n（4）根据材料四，如图反映了明治维新时期民众服装的差异，有人穿传统服装，有人穿西式服装。结合所学知识，指出这是改革的哪一方面。经过改革，日本走上了什么道路？&amp;#10;&amp;#10;\n（5）根据材料一、材料二和材料四，总结引起服饰变化的共同因素。&amp;#10;&amp;#10;", "历史_2020_31.jpg"], [2020, "32", "材料分析题", "中", "郑和下西洋、洋务运动、世界格局多极化、改革开放经济特区", "32．坚持“引进来和走出去并重，遵循共商共建共享”原则，加强开放合作，是时代发展的潮流。阅读材料，回答问题。&amp;#10;&amp;#10; 材料一：如图。 材料二：为了迅速掌握西方先进的科学技术，洋务派还向美国、英国、德国派遣了留学生，其中派往美国的四批，120人；派往欧洲的四批，85人……后来这些留学生大都学有所成，许多人成为中国各项近代化事业的开创者……在电讯业方面，国家和地方电报局的负责人几乎全由留学归来人员担任，从而摆脱了外国对这一领域的控制企图。 ﹣﹣摘自张海鹏、翟金懿《简明中国近代史读本》 材料三：全球范围内冲突和贫困尚未根除，但和平与发展的时代潮流愈发强劲。世界多极化、经济全球化、文化多样化、社会信息化深入发展。弱肉强食的丛林法则、你输我赢的零和游戏不再符合时代逻辑，和平、发展、合作、共赢成为各国人民共同呼声。 ﹣﹣摘自习近平《论坚持推动构建人类命运共同体》 材料四：今年是深圳经济特区成立40周年。深圳要充分释放“双区驱动效应”，多方面发力，努力成为全面现代化的典范，特别是制度现代化的典范，提升社会主义制度的吸引力。在推动制度开放的过程中，深圳要主动学习借鉴国际先进规则，不断完善自身的营商环境，力争成为新时代中国对接国际的窗口、国内国际双向开放的桥梁。 ﹣﹣摘编自《深圳特区报》2020年6月24日 请回答：\n（1）根据材料一并结合所学知识，指出郑和下西洋所处的朝代。郑和能够完成此壮举的必备条件有哪些？&amp;#10;&amp;#10;\n（2）根据材料二并结合所学知识，列举一位洋务派的代表人物。结合材料二分析洋务派派遣留学生的直接目的。该材料反映出洋务运动的性质是什么？&amp;#10;&amp;#10;\n（3）根据材料三并结合所学知识，指出二战以来世界格局发生的变化。当今世界的时代主题是什么？举例说明“社会信息化”在我们生活中的具体表现。&amp;#10;&amp;#10;\n（4）根据材料四并结合所学知识，指出深圳现代化的迅速发展得益于哪一项重大决策。与深圳同一批建立的经济特区还有哪些？（答出两个即可）。&amp;#10;&amp;#10;\n（5）综合上述四则材料并结合所学知识，请你为深圳“成为全面现代的典范”提一个合理建议。&amp;#10;&amp;#10;", "历史_2020_32.jpg"], [2022, "12", "选择题", "中", "近代新闻出版业、科学知识传播", "12．《儿童画报》是面向儿童的一种刊物，发行于 1902 至 1904 年间。据著名报人萨空了回 忆，他在七八岁时最喜欢《儿童画报》的合订版，在画报中获得了许多科学知识。例 如瓦特通过沸水发明了蒸汽机，世界人种的分类和五大洲的形状。这说明该刊物（ ）\n　　A． 否定了传统文化\n　　B． 传播了科学知识\n　　C． 成为了学校教材\n　　D． 宣传了革命思想", "历史_2022_12.jpg"], [2022, "16", "选择题", "中", "中美关系正常化、70年代外交", "16．1969年同中国建交的西方资本主义国家只有法国等六个国家。1973年时，中国与除美国以外的其他西方资本主义发达国家基本建交，同欧盟也建立了正式关系。这种情况的变化反映了（ ）\n　　A． 社会主义制度的确立\n　　B． 中美关系的缓和\n　　C． 资本主义阵营的分化\n　　D． 改革开放的需要", "历史_2022_16.jpg"], [2022, "19", "选择题", "中", "工业革命、瓦特改良蒸汽机", "19．瓦特在取得专利的说明书中，把他的蒸汽机说成是大工业普遍适用的发动机，与当时使用其他动力来源的机器相比，他的普遍适用性体现在（ ）\n　　A． 突破地理条件的限制\n　　B． 机器简单易于制造\n　　C． 能源清洁更加环保\n　　D． 可用能源丰富多样", "历史_2022_19.jpg"], [2022, "20", "选择题", "中", "日本明治维新、发展资本主义", "20．1868 年，一批新的领导人在日本开始了革命性的变革，并最终把日本提高到一个具有国际威望的大国地位，这个改革（ ）\n　　A． 仿效唐朝典章制度\n　　B． 开启了幕府统治\n　　C． 推行锁国政策\n　　D． 发展了资本主义", "历史_2022_20.jpg"], [2022, "22", "选择题", "中", "世界多极化趋势", "22．有学者指出，世界正迎来非西方大国和非西方世界的“群体性崛起”和美国主导的世界 秩序“失序”这样一个历史转折的重要时刻。此观点认为（ ）\n　　A． 美国的综合国力迅速衰落\n　　B． 西方国家已无法影响世界\n　　C． 世界多极化趋势的发展\n　　D． 非西方国家主导世界秩序", "历史_2022_22.jpg"], [2022, "23", "选择题", "易", "信息技术发展", "23．2022 年北京冬奥会开幕式中，表演者的舞台采用光影投屏技术，形成巨大冰面视效， 每一秒地屏画面都会随节目的调整而变化，或空灵或浪漫，呈现出独特美学。2008 年奥运会开幕式也曾计划采用这种方式，但技术尚不成熟。如今技术成熟得益于（ ）\n　　A． 信息技术的进步\n　　B． 电影拍摄技术的提高\n　　C． 空间技术的发展\n　　D． 快速制冰技术的出现 二、非选择题 (2 大题，共 24 分)", "历史_2022_23.jpg"], [2022, "24", "材料分析题", "中", "五四运动、铁人精神大庆、一五计划、改革开放经济特区", "24．阅读材料，回答下列问题。习近平指出，工人阶级是中国共产党最可靠和最坚实的阶级基础，工人阶级和广大劳动 人民是推动经济社会发展和维护社会安定团结的根本力量。&amp;#10; 材料一：1919年 6 月 11 日，张东荪在《时务新报》中指出：“我们的罢工和同时期外 国的罢工在性质上是不同的。他们的罢工，是劳动者和资本家的争斗，有的为了工值，有的 为了工作时间，有的为了工作待遇。我们的，为的是不愿再受到一二卖国贼的支配，是争回 民主国民的资格。” ——张德旺《道路和选择》 材料二：庆石油工人发出了：“宁可少活二十年，拼命也要拿下大油田”的 口号，体现了大庆石油工人“爱国，求实，创新，奉献”的精神风貌，铸就了铁人精神。 —— 中共党史研究室《中共共产党的九十年》 材料三：深圳特区的建立吸引了全国各地的劳动者，形成了上世纪 80 年代“百万劳工 下深圳”的打工热潮。外来务工者为深圳的发展做出了重要的贡献。 准备打饭的蛇口工业区玩具厂工人 沙井工厂流水线的工人领到第一笔工资 ——深圳市档案馆《先行之路—深圳经济特区发展档案》 请回答：\n（1）根据材料一，结合所学知识，五四时期工人罢工的要求是什么？五四时期的工人和同时期西方工人运动有什么区别？ (不 得 照 抄 原 文)\n（2）根据材料二，说你出“铁人精神”在社会主义建设艰辛探索时期的意义是什 么？ 某地组织党员实地学习上世纪五六十年代干部群众的精神风貌，请你 推荐一个 城市或地区，并说明理由。\n（3）材料三的图片中，劳动者脸上都洋溢着发自内心的喜悦。结合上述 const dmeta=document.getElementById('dmeta'), dkps=document.getElementById('dkps'), dbox=document.getElementById('dbox');
const lb=document.getElementById('lightbox'), lbimg=document.getElementById('lbimg');
function openLB(src){ if(!src) return; lbimg.src=src; lb.classList.add('open'); lb.scrollTop=0; }
function closeLB(){ lb.classList.remove('open'); lbimg.removeAttribute('src'); }
lb.addEventListener('click', closeLB);
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLB(); });
const PACKURL='https://pub-e7f17b08dc9449eb886cc12ad017ddc0.r2.dev/v1/%E9%A2%98%E5%9B%BE%E5%8C%85/'+encodeURIComponent('历史')+'.json';
let PACK=null, packState=0; const waiters=[];   // 0未载/1载入中/2成功/3失败
function ensurePack(cb){
  if(packState===2||packState===3){cb();return;}
  waiters.push(cb);
  if(packState===0){ packState=1;
    fetch(PACKURL).then(r=>r.ok?r.json():Promise.reject()).then(d=>{PACK=d;packState=2;})
      .catch(()=>{packState=3;}).finally(()=>{waiters.splice(0).forEach(f=>f());});
  }
}
let curImg=null, curKey=null;
function setText(t){ curImg=null; dbox.innerHTML='<div class="q">'+t+'</div>'; dbox.scrollTop=0; }
function show(pt){
  const d=pt.customdata, key=d[0]+'/'+d[1];
  if(key===curKey) return;              // 同一题重复 hover 不刷新，减少抖动
  curKey=key;
  dmeta.textContent=d[0]+'年 · 第'+d[1]+'题 · '+d[2]+' · 难度'+d[3];
  dkps.innerHTML=(d[4]||'').split('、').filter(Boolean).map(k=>'<span class="kp">'+k+'</span>').join('');
  if(d[6]){
    if(packState!==2 && !curImg) dbox.innerHTML='<span class="ph">载入原题截图…</span>';
    ensurePack(()=>{ if(curKey!==key) return; const uri=PACK&&PACK[d[6]];
      if(uri){
        if(!curImg){ dbox.innerHTML=''; curImg=document.createElement('img'); curImg.className='qimg'; curImg.alt='原题截图'; curImg.title='点击放大'; curImg.onclick=function(){openLB(curImg.src);}; dbox.appendChild(curImg); }
        curImg.src=uri; dbox.scrollTop=0;          // 只换 src，容器高度固定，整页不跳
      } else setText(d[5]||'（截图缺失）');
    });
  } else setText(d[5]);
}
const gd=document.getElementById('plot');
gd.on('plotly_click',e=>{if(e.points&&e.points[0])show(e.points[0]);});
gd.on('plotly_hover',e=>{if(e.points&&e.points[0])show(e.points[0]);});
