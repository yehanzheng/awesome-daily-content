<style>
:root{--bg:#f6f7f9;--fg:#1c2128;--mut:#5b6470;--line:#e5e8ec;--card:#fff;--c:#c0392b}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--fg:#e6edf3;--mut:#9aa4b0;--line:#222a33;--card:#161b22}}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg)}
.wrap{max-width:1320px;margin:0 auto;padding:14px}
a.back{color:var(--c);text-decoration:none;font-size:14px}
h1{font-size:20px;margin:.3em 0 .1em}
.hint{color:var(--mut);font-size:13px;margin:.2em 0 .6em}
/* 左右分栏联动：左散点图、右详情面板，同屏并排，hover 即时出题、零滚动 */
.stage{display:flex;gap:14px;align-items:stretch}
.left{flex:0.95;min-width:0;display:flex;flex-direction:column}
#plot{width:100%;height:calc(100vh - 200px);min-height:420px;background:var(--card);border:1px solid var(--line);border-radius:12px}
#detail{flex:1.5;min-width:420px;max-width:840px;height:calc(100vh - 200px);min-height:420px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--c);border-radius:12px;padding:14px;position:sticky;top:12px;display:flex;flex-direction:column;overflow:hidden}
#detail .meta{font-size:13px;color:var(--mut);margin-bottom:6px}
#detail .kps{margin-bottom:8px}
#detail .bar{margin-bottom:8px}
#pdfbtn{background:color-mix(in srgb,var(--c) 14%,transparent);color:var(--c);border:1px solid var(--c);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer}
#pdfbtn[disabled]{opacity:.45;cursor:default;border-color:var(--line);color:var(--mut);background:transparent}
.qbox{flex:1;min-height:0;overflow:auto;border-radius:8px}      /* 题目在面板内部滚动，整页不动 */
.qbox .q{font-size:15px;line-height:1.7;white-space:pre-wrap}
.qimg{max-width:100%;height:auto;display:block;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:zoom-in}
.ph{color:var(--mut)}
@media(max-width:860px){                                          /* 窄屏退化为上下堆叠 */
  .stage{display:block}
  #plot{height:56vh}
  #detail{height:auto;max-width:none;position:static;margin-top:12px;display:block}
  .qbox{height:44vh}
}
/* 点击截图放大的浮窗 */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;z-index:60;overflow:auto;padding:28px}
.lb.open{display:flex}
#lbimg{max-width:min(98vw,1200px);height:auto;background:#fff;border-radius:8px;box-shadow:0 10px 50px rgba(0,0,0,.6);cursor:zoom-out;margin:auto}
.lb-x{position:fixed;top:14px;right:18px;background:#fff;color:#111;border:0;border-radius:20px;padding:6px 15px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:61}
/* 全屏 PDF 浮窗：在试卷中看该题（含材料） */
.pdfbox{position:fixed;inset:0;background:#111;display:none;z-index:70}
.pdfbox.open{display:flex;flex-direction:column}    /* flex 纵向，iframe 撑满 */
.pdf-bar{flex:none;height:46px;background:#1a1a1a;color:#eee;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:14px}
.pdf-x{background:#fff;color:#111;border:0;border-radius:18px;padding:5px 14px;font-size:14px;font-weight:600;cursor:pointer}
#pdfv{flex:1 1 auto;min-height:0;width:100%;border:0;background:#fff}
.kp{display:inline-block;background:color-mix(in srgb,var(--c) 14%,transparent);color:var(--c);border-radius:10px;padding:1px 8px;font-size:12.5px;margin:2px 3px 0 0}

奔驶，而且这种烈性，也会传导给人，燃烧起人的求战热望。有回，当我勒了马屏住气息，等候前面化来爆裂的枪声时，我发现马的两只耳朵在簌簌抖颤，两只前蹄不断踏动， 全身肌肉和鬃毛、都发岀一种渴望临战的精神而后，当号声响起时，我刚翻身上马。它就像离弦之箭一样勇猛冲飞而前，那真是在飞，全身拉成条直线。我伏在马上，马的烈性传到我身上，我感到全身的血液都在沸腾，这是一种生命的强大的暖流啊！它把我和马融合在一起。风，那样锐厉地劈面而来、呼啸而过，用不到我的鞭策，马自己就奔向火线。是的，那里有流血、有死亡，但这一切在这一刹那间都不在话下，只有一种胜利的快感在大大鼓舞着我们马不畏惧战争，而是渴望战争。还有一次，我骑马夜涉辽河，水涨流急，又是漆黑之夜，伸手不见五指，但，在这紧急关头，马仰起脖微微嘶鸣了一声，用了甩尾巴就踏入河身。我只觉得水在周围旋转，几次卷入旋涡，我一提缰绳，马便跳跃而起，后来，在最深的河心，它竟展开四蹄，浮游起来，它不但那样勇敢，而且那样机敏。我在一首诗里曾写过这样诗句： ④我真喜爱真正的骏马呀！它长得那样英俊、那样飒爽，它的眼光充满智慧它的肌腱饱含雄健，它卷恋自己人时何等挚爱，它冲向敌人时那样猛烈，它的四蹄在大地上敲岀鼓声，它的长啸给人带来豪情，它既像一缕柔情、又像万里雷霆。而今，距离战争时间很遥远很遥远了。就在战争后期，也由于换了吉普，而与马作别，但现在，我想起来，还是那样恋恋于我的战马呀！前面，谈到我和那匹菊花青马分手时马的动情之处，我还没有说养这匹马的饲养员呢！他夜里伴着马睡眠，为了夜半更深起来哏上饲料，他给它引最清凉的水饮，每到宿营地，他看到马身上汘水淋漓，他就埋怨我…", "语文_2021_14.jpg", 4, "语文_2021"], [2022, "11", "简答题", "中", "信息筛选概括", "11.展会请你做讲解员，请简要概括材料一中我国航天方面所取得的成就。 _____________________________________________________________________________________ _____________________________________________________________________________________", "语文_2022_11.jpg", 6, "语文_2022"], [2023, "13", "简答题", "中", "非连续性文本、图表信息概括", "13、从材料一表1中，你得出了什么结论？（2分） _______________________________________________________________________________________ _______________________________________________________________________________________", "语文_2023_13.jpg", 5, "语文_2023"], [2023, "14", "简答题", "中", "非连续性文本、信息筛选整合", "14、从材料二和材料三之中总结出第19届文博会能够成功举办的原因。（3分） _______________________________________________________________________________________ _______________________________________________________________________________________", "语文_2023_14.jpg", 5, "语文_2023"], [2023, "15", "选择题", "易", "非连续性文本、信息定位", "15、选择题：如果要介绍淄博烧烤应该去哪一个展馆？（ ）（2分）\n　　A． 9号展馆\n　　B． 10号展馆\n　　C． 13号展馆\n　　D． 14号展馆", "语文_2023_15.jpg", 5, "语文_2023"], [2023, "16", "语言运用题", "难", "非连续性文本、仿写、探究寓意", "16、仿照示例，另外从“小贴士”中选一个常用语，探究小水滴作为文博会吉祥物的寓意。（3分） 小贴士：和水有关的常用语 水乳相融 水涨船高 水滴石穿 水无常形 上善若水 示例：我选“海纳百川”，水是流动的，小水滴汇入大海，像各类展品，汇聚文博会平台展示。 _____________________________________________________________________________________________ _____________________________________________________________________________________________ （四）文学作品阅读（16分） 水桶里晃动的 刘荒田 ①“水桶里晃动的”这一意象，来自一首新诗。读罢顿时拍案，太有新意了。然而，那又是从童年起就烂熟的啊！ ②怎么能够忘记水桶？ ③小时候我居住的岭南小镇，镇中心流过一条不大不小的河，名叫“横水”。别指望什么“水是眼波横”，它的源头是连绵的大牛山，从方圆数十里阡陌纵横的田垌、炊烟袅袅的村庄、布满菜垄和坟墓的坡地，收纳各种各样的水，经过镇里埠头时，浑绿、浓稠。到了六月吃粽子的时节，洪涝来了，小孩子从石桥上吆喝着跳下，出水时头上披着泥沙。 ④我和姐姐天天踏着花岗岩做的石级，把河水打进水桶，挑回家饮用。如今回头看，大吃一惊，混合着人畜排泄物、海量垃圾的污水，沿河人家喝了多少世代！直到上世纪50年代，居民才开始把明矾放进水缸，沉淀的杂质动不动是几寸厚。到了改革开放后，终于喝上了洁净的自来水。 ⑤挑水时，好玩的不是水，而是水桶里晃动的倒影。那时我七八岁，祖母为我的窄肩配备的水桶是薄铁做的，容量不大，挑起来分量正好。大我三岁的姐姐负责打水，整理棕绳，为我扶起小扁担。（甲）起步后，水桶发出奇妙的金属声，让人想到梵音，哐啷哐啷，紧随步子的节奏。小小的水桶盛上水，如果静止，倒影不过是原物的拷贝；水晃动，便被赋予了生气，万花筒一般，幻化出奇异的色彩、怪诞的图形。 ⑥挑起水桶，踏上九级石阶，被水桶里的风景迷住。先是从果园篱笆上伸出的番石榴树。果子躲在叶丛，桶里却看得分明。继而是充满动感的铺子，头一间是大芳茶楼，（乙）招牌被水波颤出皱褶，“大芳”两个榜书仿佛跳起舞来。骑楼下，小女孩在踢毽子，影子在水底飞过。然后是街角的一棵紫荆树，正是花期，桶里盛着艳丽的姿色，比树上的花更水灵。拐进小巷，倒影便全是乌黑的墙壁。 ⑦从小学三年级开始，河水只拿来洗衣物，与小镇相邻的村庄有一口水井，饮用水去那里打。路远了，怕水溅出，挑上肩前，姐姐往桶里放上几片树叶。并沿的蔷薇开花那阵，姐姐趁村人不在旁，摘下几朵放在水上，慌慌张张像做贼。其实哪有人稀罕？ ⑧井水比河水有看头，清凌凌的。离开井台往小镇走，经过一条俗称“竹巷”的植物长廊，两旁不全是…", "语文_2023_16.jpg", 5, "语文_2023"], [2024, "4", "简答题", "中", "信息提取与概括、图文转换", "4.考试结束后，请将本试卷和答题卡一并交回。 万物生生不息“变”是永恒主题 [回顾·变] 一、基础知识与运用(共5题，共13分) [围屋说“围”] 围屋是围起来的建筑。俯瞰围屋，其整体结构像个巨大的“围”字(如图1)。汉字中像“围”这样带“口”(读wéi)的字还有很多，有的表示围起来的地方，如“圈”是古人养牲畜的地方，yuán“①”是种果树的地方，pǔ“②”是种菜的地方。 围屋是以堂屋为中心向外扩展而形成的庞大建筑体。家族世代居于其中，老少其乐融融，这场景正如对联所言“一围居室▲▲▲，四方天地家国情”。 围屋镌刻着客家人大迁徙的历史，留存了传统文化印记，当时代的脚步沿着青石板路悄然而来，人们走出古老的围屋▲奔赴广阔的天地；而围屋大门的漆色渐渐斑驳，院内幽深的十寂静敲打着斜阳……", "语文_2024_4.jpg", 1, "语文_2024"], [2024, "11", "选择题", "中", "信息筛选与辨析", "11.根据材料，同学们有以下分析，其中不准确的项( )(2分)\n　　A. 月球上造房子要考虑极端环境、建筑材料和工程建设能力全国。\n　　B. 月面要承受大温差和强烈辐射，月球建筑可以考虑用月壤。\n　　C. 原位建造式方案是在地球预制完整的建筑，运载至月球表面安装\n　　D. 在不断探索下，未来十年左右中国将有可能建设国际月球科研站。", "语文_2024_11.jpg", 4, "语文_2024"]], "hovertemplate": "<b>%{customdata[0]}年 · %{customdata[1]}题</b><br>%{customdata[2]}　难度：%{customdata[3]}<br>知识点：%{customdata[4]}<extra></extra>"}, {"x": [79.9, 61.85, 10.14, 17.34, 47.52, 58.26, 74.8, 50.88, 68.56, 54.83, 74.88, 68.55, 60.33, 56.32, 62.04, 69.7, 68.39, 74.0, 18.25, 52.29, 66.73, 60.5, 65.94, 47.28, 60.66, 53.09], "y": [55.51, 77.52, 33.3, 29.98, 50.83, 44.58, 54.65, 39.24, 78.48, 42.91, 51.03, 78.38, 40.27, 35.72, 64.92, 34.3, 44.37, 47.03, 27.53, 68.21, 51.71, 53.5, 65.19, 32.14, 45.09, 47.92], "mode": "markers", "type": "scatter", "name": "簇3 修辞手法·文学常识·病句辨析与修改（26）", "marker": {"size": 9, "color": "#e15759", "line": {"width": 0.5, "color": "rgba(255,255,255,.6)"}, "opacity": 0.82}, "customdata": [[2020, "2", "选择题", "中", "成语运用", "2．请选出下列句子中加点成语运用不正确的一项（ ）\n　　A． 小明将《论语》寻章摘句。截取了一段作为自己演讲的内容。\n　　B． 解论赛上。我方解手引经据典，强词夺理。赢得了一片热烈的掌声。\n　　C． 产业扶贫能增强贫困地区的造血功能，有了稳定的脱贫政策，农民脱贫的信心与日俱增。\n　　D． 设计者和匠师们因地制宜，自出心裁，修建成功的园林当然各个不同。", "语文_2020_2.jpg", 1, "语文_2020"], [2020, "3", "选择题", "中", "病句", "3．请选出下列句子中没有语病的一项（ ）\n　　A． 各个时期“创美、立美、感美&amp;quot;的审美教育应该相互结合，目的指向培育和提高少年的审美趣味和审美能力，增强学生的审美观念。\n　　B． 每年有超过100颗以上的人造卫星发射升空。\n　　C． 创造科技术平××提高××意识。\n　　D． 为了提高学生安全意识，防止交通事故的发生，各班都召开了交通安全主题班会。", "语文_2020_3.jpg", 1, "语文_2020"], [2020, "4", "选择题", "中", "句子排序", "4．请选出下列选项中排序正确的一项（ ） ①所以，它在地面上出现的时候，身上常有许多潮湿的泥点。 ②它掘土的时候，将汁液喷洒在泥土上。使泥上成为泥浆，于是墙壁就更加柔软。 ③幼虫再用它肥重的身体压上去，使烂泥挤进干土的罅隙。 ④它臃肿的身体里面有一种汁液，可以用力抵御穴里的尘土。\n　　A． ①②③④\n　　B． ④②③①\n　　C． ④①②③\n　　D． ①③②④", "语文_2020_4.jpg", 1, "语文_2020"], [2020, "5", "选择题", "中", "文学常识、句式与句子主干", "5．请选出下列说法不正确的一项( ）\n　　A． 《醉翁亭记》作者唐代诗人柳宗元在文中表达了随遇而安、与民同乐的思想感情。\n　　B． “你在这里呆着，不要走动”是一个析使句；“你要赞美白杨树!”是一个感叹句。\n　　C． 演讲者多运用肢体语言方法使演讲更具有感染力。\n　　D． “在乌云和大海之间，海燕像黑色的闪电，在高傲地飞翔。”这句话的主干是“海燕飞翔”。 二、本大题共1题，每空1分，共10分。", "语文_2020_5.jpg", 1, "语文_2020"], [2020, "9(1)", "填空题", "中", "词语理解、心理揣摩", "9．阅读下面文段，完成问题。&amp;#10;&amp;#10; 燕子筑窝 ①春天里，我家来了一时燕子，妈妈说，它们是夫妻，要在我家过日子，养孩子。 ②堂屋里的屋梁上，已有两个燕窝，住着两对燕子，它们是去年就住下的老夫妻了。一到春天，它们又从南方返回来了。我当时不太懂南方是什么意思，为什么非要跑那么选去南方。爹爹说，南方暖和，北方冷。燕子冬天去南方过冬，到春天又返回我们这里。 ③爹爹说，来我们家的燕子，无论新的老的，都是我们的亲戚，我们要爱惜。 ④新来的这对燕子，发现堂屋已有燕子居佳，就在门外的屋榜下筑窝。 ⑤它们一趟趟从田野里衔来湿泥，泥里还带着一些枯叶和细碎草秸。爹爹说，泥里带点草秸，才容易黏合，修的房于才凝固得结实，娃娃你看，燕子没上过学没念过书。都这么聪明，你们学生娃可要好好学习哦。 ⑥它们的工程进行得很不容易。因为没有施工图。常常要返工。有时，好像是地基铺得太宽，不符合紧凑、安全和保暖原理，它们就收紧了地基的尺寸重新施工。原来的地基就作度了：有时，好像房屋的弧度过于弯曲，不够流畅，不方便出入。不利于通风，也不符合建筑美学和以后新生儿的护理学。它们就倒悬着或斜倚着身子，伏在建线工地上，一口口地啄啊掰啊抹啊，就像我们伏在课来上一笔一画修改作业。 ⑦连续好多天，燕子夫妻白天抓紧施工，晚上却不见了。它们晚上住哪里呢? ⑧其实，堂屋的屋梁上，或我家的任何一间屋子。我们都是乐意接待它们过夜的。但是，燕子好像有自己的心事和处事的伦理，它们不愿打扰另外两对年长的燕子。也不愿意改变主人家的生活秩序。它们好像遵守着世代相传的道德禁忌：不能因为它们的到来，给春天添麻烦，&amp;#10;给主人添麻烦。相反，它们要努力做到。因为它们的到来，春天欢喜，主人也欢喜。 ⑨那么，它们晚上住哪里呢?春天的夜里，天气还是很冷的。 ⑩那天黄昏，天下着小雨，它们衔完最后一趟泥，向我们亲热地打了几声招呼，又飞走了。⑪我追着它们的身影，飞快地跑出去，跑向原野，我终于看见它们了。它们并肩依偎着歇在电线上，它们在冰凉的却汹滴着电流的电线上，在夜晚的寒风中，有时就在雨水里，它们紧挨着羽毛相互取暖。露天过夜。 ⑫吹拂着庄稼的夜风，狂野鰵密的露珠和满天的星星，都见证了它们都清贫的生活。高贵的品德和坚贞的爱情。 ⑬我急忙回到家里，在门前菜地里挖了些湿泥，准备搭起梯子，帮助燕子筑巢，让它们尽早住进新窝。 ⑭爹爹说：你娃真傻呀，燕子做的活你娃能做吗?鲁班能修宫殿，也修不了一个燕窝的。喜鹊窝只有喜鹊会修，蜂窝只有蜂儿会修。燕窝只有燕子会修。人家燕子筑窝，心里是揣着一张祖传的图纸的。你心里有那张图纸吗? ⑮爹的话我信。爹会一些简单的木工，他知道心里有一张图纸是多么重要。 ⑯我觉得对不起燕子，在它们艰辛的时光，在这个泥泞的春天里，竟不能为它们帮一点忙。为春天帮一点忙。 ⑰亲眼看着一趟趟街泥忙碌的燕子，看着燕窝一点点渐渐成型，我心里满含着…", "语文_2020_9_1_.jpg", 3, "语文_2020"], [2020, "9(3)", "简答题", "中", "语句赏析、修辞手法", "9．阅读下面文段，完成问题。&amp;#10;&amp;#10; 燕子筑窝 ①春天里，我家来了一时燕子，妈妈说，它们是夫妻，要在我家过日子，养孩子。 ②堂屋里的屋梁上，已有两个燕窝，住着两对燕子，它们是去年就住下的老夫妻了。一到春天，它们又从南方返回来了。我当时不太懂南方是什么意思，为什么非要跑那么选去南方。爹爹说，南方暖和，北方冷。燕子冬天去南方过冬，到春天又返回我们这里。 ③爹爹说，来我们家的燕子，无论新的老的，都是我们的亲戚，我们要爱惜。 ④新来的这对燕子，发现堂屋已有燕子居佳，就在门外的屋榜下筑窝。 ⑤它们一趟趟从田野里衔来湿泥，泥里还带着一些枯叶和细碎草秸。爹爹说，泥里带点草秸，才容易黏合，修的房于才凝固得结实，娃娃你看，燕子没上过学没念过书。都这么聪明，你们学生娃可要好好学习哦。 ⑥它们的工程进行得很不容易。因为没有施工图。常常要返工。有时，好像是地基铺得太宽，不符合紧凑、安全和保暖原理，它们就收紧了地基的尺寸重新施工。原来的地基就作度了：有时，好像房屋的弧度过于弯曲，不够流畅，不方便出入。不利于通风，也不符合建筑美学和以后新生儿的护理学。它们就倒悬着或斜倚着身子，伏在建线工地上，一口口地啄啊掰啊抹啊，就像我们伏在课来上一笔一画修改作业。 ⑦连续好多天，燕子夫妻白天抓紧施工，晚上却不见了。它们晚上住哪里呢? ⑧其实，堂屋的屋梁上，或我家的任何一间屋子。我们都是乐意接待它们过夜的。但是，燕子好像有自己的心事和处事的伦理，它们不愿打扰另外两对年长的燕子。也不愿意改变主人家的生活秩序。它们好像遵守着世代相传的道德禁忌：不能因为它们的到来，给春天添麻烦，&amp;#10;给主人添麻烦。相反，它们要努力做到。因为它们的到来，春天欢喜，主人也欢喜。 ⑨那么，它们晚上住哪里呢?春天的夜里，天气还是很冷的。 ⑩那天黄昏，天下着小雨，它们衔完最后一趟泥，向我们亲热地打了几声招呼，又飞走了。⑪我追着它们的身影，飞快地跑出去，跑向原野，我终于看见它们了。它们并肩依偎着歇在电线上，它们在冰凉的却汹滴着电流的电线上，在夜晚的寒风中，有时就在雨水里，它们紧挨着羽毛相互取暖。露天过夜。 ⑫吹拂着庄稼的夜风，狂野鰵密的露珠和满天的星星，都见证了它们都清贫的生活。高贵的品德和坚贞的爱情。 ⑬我急忙回到家里，在门前菜地里挖了些湿泥，准备搭起梯子，帮助燕子筑巢，让它们尽早住进新窝。 ⑭爹爹说：你娃真傻呀，燕子做的活你娃能做吗?鲁班能修宫殿，也修不了一个燕窝的。喜鹊窝只有喜鹊会修，蜂窝只有蜂儿会修。燕窝只有燕子会修。人家燕子筑窝，心里是揣着一张祖传的图纸的。你心里有那张图纸吗? ⑮爹的话我信。爹会一些简单的木工，他知道心里有一张图纸是多么重要。 ⑯我觉得对不起燕子，在它们艰辛的时光，在这个泥泞的春天里，竟不能为它们帮一点忙。为春天帮一点忙。 ⑰亲眼看着一趟趟街泥忙碌的燕子，看着燕窝一点点渐渐成型，我心里满含着…", "语文_2020_9_3_.jpg", 3, "语文_2020"], [2021, "2", "选择题", "中", "成语辨析、关联词语、语境运用", "2．请结合语境，从文中的括号内选择正确的成语填入【甲】【乙】处。 &amp;#10;&amp;#10;", "语文_2021_2.jpg", 1, "语文_2021"], [2021, "3", "选择题", "中", "短语类型、词性、修辞手法、文学常识", "3．选择下列选项中错误的一项（ ）\n　　A． “花团锦簇”“环境宜人”都是补充短语。\n　　B． “灿烂″“热闹”“鲜艳夺目”，这三个词的词性都是形容词。\n　　C． “驿外断桥边，寂寞开无主。”出自陆游的《卜算子·咏梅》，“卜算子″是词牌名。\n　　D． “她撇开女子的娇羞尽情绽放红的似火粉的似霞，白的赛雪。”使用排比、比喻、拟人的修辞手法。", "语文_2021_3.jpg", 1, "语文_2021"], [2021, "4", "选择题", "中", "病句辨析与修改", "4．下列选项中对病句修改正确的一项是（ ）\n　　A． 《闯》的作者是由设计者郑建平为深圳于 1993 年创作的。（应修改为由设计者郑建平于1993 年为深圳创作的是《闯》的作者。）\n　　B． 《闯》的作者是由设计者郑建平于 1993 年为深圳创作的。（应修改为：《闯》的作者是于1993 年为深圳创作的设计者郑建平。）\n　　C． “&amp;quot;拓荒牛”的作者是著名中国的雕塑家潘鹤在 1984 年创作的。（应修改为：“拓荒牛”的作者是中国著名的雕塑家潘鹤在 1984 年创作的。\n　　D． &amp;quot;拓荒牛″的作者是著名中国的雕塑家潘鹤在 1984 年创作的。（应修改为：“拓荒牛”的作者是在 1984 年创作的著名中国的雕塑家潘鹤。）", "语文_2021_4.jpg", 1, "语文_2021"], [2021, "17", "简答题", "中", "句子赏析、修辞手法、情感分析", "17．赏析文中画线句。 ____________________________________________________________________________________________ ____________________________________________________________________________________________", "语文_2021_17.jpg", 6, "语文_2021"], [2022, "1(2)", "选择题", "中", "词语辨析、词语运用", "1.阅读文雅的演讲稿《奋斗·青春》中的一段文字，按要求作答。 奋斗的青春最美丽。从冬ảo赛场上顽强拼搏、挑战自我的运动健儿，到广袤田野上艰苦奋斗，建设美丽乡村的年轻面孔，到碧海蓝天间 甲 天字、捍卫主权的空中卫士……广大青年向我们展开了青春亮丽的风采，也感召着我们在青春的赛道上奋力奔跑。 心中有阳光，脚下有力量。在追梦的路上，有温情的师长相随，有真zhì的友谊作伴，有 乙 的书籍引路，我们要擦亮“奋斗”这个青春最亮的底色，矢志不渝， 丙 新时代的青春之歌! (1)根据拼音写汉字，给加下画线的字注音。 冬ào_____ 广袤_____ 真zhì_____ (2)在文段甲、乙、丙三处横线上依次填入语，恰当的一项是( )\n　　A. 飞翔浩瀚书写\n　　B. 翱翔浩大书写\n　　C. 飞翔浩大谱写\n　　D. 翱翔浩瀚谱写 (3)文中画线的语句有一处语病，请写出修改意见。", "语文_2022_1_2_.jpg", 1, "语文_2022"], [2022, "1(3)", "简答题", "中", "病句辨析与修改", "1.阅读文雅的演讲稿《奋斗·青春》中的一段文字，按要求作答。 奋斗的青春最美丽。从冬ảo赛场上顽强拼搏、挑战自我的运动健儿，到广袤田野上艰苦奋斗，建设美丽乡村的年轻面孔，到碧海蓝天间 甲 天字、捍卫主权的空中卫士……广大青年向我们展开了青春亮丽的风采，也感召着我们在青春的赛道上奋力奔跑。 心中有阳光，脚下有力量。在追梦的路上，有温情的师长相随，有真zhì的友谊作伴，有 乙 的书籍引路，我们要擦亮“奋斗”这个青春最亮的底色，矢志不渝， 丙 新时代的青春之歌! (1)根据拼音写汉字，给加下画线的字注音。 冬ào_____ 广袤_____ 真zhì_____ (2)在文段甲、乙、丙三处横线上依次填入语，恰当的一项是( )\n　　A. 飞翔浩瀚书写\n　　B. 翱翔浩大书写\n　　C. 飞翔浩大谱写\n　　D. 翱翔浩瀚谱写 (3)文中画线的语句有一处语病，请写出修改意见。", "语文_2022_1_3_.jpg", 1, "语文_2022"], [2022, "5", "简答题", "中", "诗句赏析、情感把握", "5.朗诵颈联时，文栋想要增强诗歌感染力，请你为他配上适宜的表情、动作。 表情:_______________________ 动作:_______________________", "语文_2022_5.jpg", 3, "语文_2022"], [2022, "6", "简答题", "中", "炼字赏析、主旨情感", "6.朗诵尾联时，文博对重读词语把握不准，请你提出建议，并说明理由。(选择一个词语即可) _____________________________________________________________________________________ _____________________________________________________________________________________ (二)文言文阅读。(14分) 王舆，合淝人。舆初为小校，从周本攻危全讽①。临战，本视贼水栅②，部分诸将，指旁山头一小营，谓舆曰:”尔往为我取彼。”舆唯唯③而色不欲行。本曰:“尔惮往耶?”舆曰:“公必不以舆为不武，请得此栅破之，舍而趋彼何为?”本大喜曰:“尔亦知此为必争之地耶?吾本自行，今为尔功，劳而遣之。舆乘轻舟，袭破其前锋，遂排栅入，诸军继址，贼大溃。 与监军甄廷坚不相得，会廷坚被诬告有贰志，烈祖④遣使械⑤廷坚。舆刺知之，密告廷坚，因为谋曰:“今独可即日乘轻舟，归阙待罪，毋与中使⑥遇。”廷坚恐惧，不暇为他谋，即从其计。至金陵，遇赦得免。 舆少从军攻润州，为巨弩所射，中右耳。失自左耳出，又中旁一人，犹立死。舆扶归营，卧百余日复起耳至老不聩亦无瘢痍⑦。攻颍州，倚营门，仗剑驱士卒登城。城上机石发，中营门及铠之半，皆糜碎，而舆不伤，莫不异之。 (选自陆游《南唐书》，南京出版社，有删节) 【注】①周本、危全讽：均为人名。②栅：设置水寨时插在水中的木桩。③唯唯：应答声。④烈祖：指南唐皇帝李昇(biàn)。⑤械：特指枷锁、镣铐一类的刑具。此处作动词。⑥中使：皇帝派出的使者。⑦瘢痍(bān yi)：创伤后留下的瘢痕。", "语文_2022_6.jpg", 3, "语文_2022"], [2022, "15", "语言运用题", "难", "对联、情节概括", "15.文雅准备以对联形式概括小说情节，并写好上联，请你写出下联。 上联：老人登山怀念革命战友 下联：_______________________", "语文_2022_15.jpg", 8, "语文_2022"], [2022, "16(1)", "简答题", "中", "标点符号作用、句子赏析", "16.常析文中画线的句子，按要求作答。 (1)100米，100米，又100米，老人脸颊涨红，额头的青筋不停地跳动。（文博认为这句话中的前两个逗号改为顿号更合适，说说你的看法。 _____________________________________________________________________________________ _____________________________________________________________________________________ (2)二十几年过主了，老人的背影一直烙在他的心底。(请你从词语的表达效果方面为加点词语做批注。) _____________________________________________________________________________________ _____________________________________________________________________________________", "语文_2022_16_1_.jpg", 8, "语文_2022"], [2022, "16(2)", "简答题", "中", "词语赏析、表达效果", "16.常析文中画线的句子，按要求作答。 (1)100米，100米，又100米，老人脸颊涨红，额头的青筋不停地跳动。（文博认为这句话中的前两个逗号改为顿号更合适，说说你的看法。 _____________________________________________________________________________________ _____________________________________________________________________________________ (2)二十几年过主了 弗学，不知其善也。 ____________________________________________________________________________________________ ②玉不琢，不成器。 ____________________________________________________________________________________________\n（3）根据内容，完善表格。&amp;#10; 核心观点(原文) 讨论角度 甲文 教学相长 ② 乙文 ① 教育的地位和作用", "语文_2020_7_3_.jpg", 2, "语文_2020"], [2020, "9(2)", "简答题", "中", "人物形象分析", "9．阅读下面文段，完成问题。&amp;#10;&amp;#10; 燕子筑窝 ①春天里，我家来了一时燕子，妈妈说，它们是夫妻，要在我家过日子，养孩子。 ②堂屋里的屋梁上，已有两个燕窝，住着两对燕子，它们是去年就住下的老夫妻了。一到春天，它们又从南方返回来了。我当时不太懂南方是什么意思，为什么非要跑那么选去南方。爹爹说，南方暖和，北方冷。燕子冬天去南方过冬，到春天又返回我们这里。 ③爹爹说，来我们家的燕子，无论新的老的，都是我们的亲戚，我们要爱惜。 ④新来的这对燕子，发现堂屋已有燕子居佳，就在门外的屋榜下筑窝。 ⑤它们一趟趟从田野里衔来湿泥，泥里还带着一些枯叶和细碎草秸。爹爹说，泥里带点草秸，才容易黏合，修的房于才凝固得结实，娃娃你看，燕子没上过学没念过书。都这么聪明，你们学生娃可要好好学习哦。 ⑥它们的工程进行得很不容易。因为没有施工图。常常要返工。有时，好像是地基铺得太宽，不符合紧凑、安全和保暖原理，它们就收紧了地基的尺寸重新施工。原来的地基就作度了：有时，好像房屋的弧度过于弯曲，不够流畅，不方便出入。不利于通风，也不符合建筑美学和以后新生儿的护理学。它们就倒悬着或斜倚着身子，伏在建线工地上，一口口地啄啊掰啊抹啊，就像我们伏在课来上一笔一画修改作业。 ⑦连续好多天，燕子夫妻白天抓紧施工，晚上却不见了。它们晚上住哪里呢? ⑧其实，堂屋的屋梁上，或我家的任何一间屋子。我们都是乐意接待它们过夜的。但是，燕子好像有自己的心事和处事的伦理，它们不愿打扰另外两对年长的燕子。也不愿意改变主人家的生活秩序。它们好像遵守着世代相传的道德禁忌：不能因为它们的到来，给春天添麻烦，&amp;#10;给主人添麻烦。相反，它们要努力做到。因为它们的到来，春天欢喜，主人也欢喜。 ⑨那么，它们晚上住哪里呢?春天的夜里，天气还是很冷的。 ⑩那天黄昏，天下着小雨，它们衔完最后一趟泥，向我们亲热地打了几声招呼，又飞走了。⑪我追着它们的身影，飞快地跑出去，跑向原野，我终于看见它们了。它们并肩依偎着歇在电线上，它们在冰凉的却汹滴着电流的电线上，在夜晚的寒风中，有时就在雨水里，它们紧挨着羽毛相互取暖。露天过夜。 ⑫吹拂着庄稼的夜风，狂野鰵密的露珠和满天的星星，都见证了它们都清贫的生活。高贵的品德和坚贞的爱情。 ⑬我急忙回到家里，在门前菜地里挖了些湿泥，准备搭起梯子，帮助燕子筑巢，让它们尽早住进新窝。 ⑭爹爹说：你娃真傻呀，燕子做的活你娃能做吗?鲁班能修宫殿，也修不了一个燕窝的。喜鹊窝只有喜鹊会修，蜂窝只有蜂儿会修。燕窝只有燕子会修。人家燕子筑窝，心里是揣着一张祖传的图纸的。你心里有那张图纸吗? ⑮爹的话我信。爹会一些简单的木工，他知道心里有一张图纸是多么重要。 ⑯我觉得对不起燕子，在它们艰辛的时光，在这个泥泞的春天里，竟不能为它们帮一点忙。为春天帮一点忙。 ⑰亲眼看着一趟趟街泥忙碌的燕子，看着燕窝一点点渐渐成型，我心里满含着…", "语文_2020_9_2_.jpg", 3, "语文_2020"], [2020, "9(4)", "简答题", "中", "阅读启示、开放探究", "9．阅读下面文段，完成问题。&amp;#10;&amp;#10; 燕子筑窝 ①春天里，我家来了一时燕子，妈妈说，它们是夫妻，要在我家过日子，养孩子。 ②堂屋里的屋梁上，已有两个燕窝，住着两对燕子，它们是去年就住下的老夫妻了。一到春天，它们又从南方返回来了。我当时不太懂南方是什么意思，为什么非要跑那么选去南方。爹爹说，南方暖和，北方冷。燕子冬天去南方过冬，到春天又返回我们这里。 ③爹爹说，来我们家的燕子，无论新的老的，都是我们的亲戚，我们要爱惜。 ④新来的这对燕子，发现堂屋已有燕子居佳，就在门外的屋榜下筑窝。 ⑤它们一趟趟从田野里衔来湿泥，泥里还带着一些枯叶和细碎草秸。爹爹说，泥里带点草秸，才容易黏合，修的房于才凝固得结实，娃娃你看，燕子没上过学没念过书。都这么聪明，你们学生娃可要好好学习哦。 ⑥它们的工程进行得很不容易。 椭圆环火轨道，成为中国第一颗人造火星卫星。5月15日，探测器成功着陆火星，火星上首次留下中国人的印记。5月22日，祝融号火星车开始巡视探测，100天行驶距离突破1000米。6月11日，天问一号探测器着陆火星首批科学影像图发布，中国首次火星探测任务取得圆满成功。这是我国航天事业发展的又一具有里程碑意义的进展，彰显出中国航天的创新自信。 ③月球探测任务科学研究取得新进展，轨道器与月球车任务刷新纪录。2021年3月，嫦娥五号轨道器成为中国首个进入日地L1点探测轨道的航天器，开展拓展任务。嫦娥四号着陆3周年之际，玉兔二号月球车行驶里程突破1000米。与此同时，嫦娥五号月球样品研究工作不断推进，中国科学院发布最新研究成果，证明了月球直至\n19.6亿年前仍存在岩浆活动，填补了人类对月球晚期演化历史认知的空白。 ④中国空间站完成阶段性目标。载人航天实现新突破。2021年4月29日，中国空间站天和核心舱发射入轨，标志着中国空间站建设进入全面实施阶段。6月17日，神舟十二号载人飞船升空，航天员聂海胜，刘伯明、汤洪波成为中国空间站首批“访客”。10月16日，航天员翟志刚、王亚平、叶光富乘坐神舟十三号载人飞船升空。成为中国空间站第二批“访客”。多次出舱，太空控课，在轨实验……太空中的中国速度、中国奇迹让人印象深刻。 (摘编自冯华余建斌《中国航天筑梦苍穹》《人民日报》2022年4月25日) 【材料二】 ①“天问一号”开启火星之旅。“羲和号”实现太阳探测零的突破，“神舟十三号”与“天和”核心舱成功对接………2021年。我国科技创新成果收获满满。接下来的2022年，如何乘势而上。持续发力? ②持之以恒加大基础研究投入。过去一年，中国全社会研发投入达到279万亿元，同比增长\n14.2%，研发投入强度达到\n2.44%。其中，基础研究投入已经达到了1696亿元。占全社会研发投入比例达到\n6.09%。基础研究做得越好，我们在科技发展上的主动…", "语文_2022_10.jpg", 4, "语文_2022"], [2022, "12", "简答题", "中", "材料探究归纳、原因分析", "12.根据材料二，材料三，请你探究中国航天取得辉煌成就的原因。 _____________________________________________________________________________________ _____________________________________________________________________________________", "语文_2022_12.jpg", 6, "语文_2022"], [2022, "13", "语言运用题", "难", "拟标题、语言表达", "13.根据上述材料，请你为本次“科技创新成就展”拟一个标题(有一定文学色彩，不超过10个字)，并简述理由。 _____________________________________________________________________________________ _____________________________________________________________________________________ 14文雅说科技改变生活，请你联系实际，谈谈科技发展对学习和生活产生的积极影响。 _____________________________________________________________________________________ _____________________________________________________________________________________ (二)小说阅读。(16分) 学校举行“追寻先辈足迹，弘扬革命精神”读书交流活动，请你参与。 勇士的背影宋子洵 ①虽已进入春天，风却也卷抉了几分寒意。朦胧的金光洒落在山顶的薄雪上，氤氲出几分雄壮悲凉。连绵陡峭的山岭在云层中若隐若现，远处传来几声鸟鸣，却未见飞鸟。夹金山的每一个清晨都是这般景象。 ②一条陡峭的山路向上延展，在视线所及之处骤然急转，消失于云层雾气中。藏族小伙扎西一早就站在路边。 ③他在等待着一位执意独自登山的老人。 ④“咚、咚、咚……”沉重的脚步声自远处传来，扎西探出头，仔细打量着来人。一个略显佝偻的身影。说着光走来。虽然脚步有此蹒跚，但每一步都像巨石一样重重地压在地上。只见老人一边走一边用留恋的眼光注视着周围，像是在回忆什么。“就是他!”扎西赶忙跟上，一路上躲躲闪闪，生怕被发现。 ⑤突然，他发现老人停下了脚步，回过头来，注视着他。 ⑥“糟了，被发现 察金\n　　C． 简·爱\n　　D． 王冕", "语文_2023_22.jpg", 7, "语文_2023"], [2023, "23(1)", "简答题", "难", "名著内容理解、红星照耀中国、联系分析", "23、读书分享。 我熟读经书，可是不喜欢它们。我爱看的是中国旧小说，特别是关于造反的故事。我很小的时候，尽管老师严加防范，还是读了《精忠传》《水浒传》《隋唐》《三国》和《西游记》。这位老先生讨厌这些禁书，说它们是坏书。我常常在学堂里读这些书，老师走过来的时候就用一本正经书遮住。大多数同学也都是这样做的。许多故事，我们几乎背得出，而且反复讨论了许多次。关于这些故事，我们比村里的老人知道得还要多些。他们也喜欢这些故事，常常和我们互相讲述。我认为这些书大概对我影响很大，因为是在容易接受的年龄里读的。（选自埃德加·斯诺《红星照耀中国》） 上面的文字是毛泽东接受斯诺采访时自述自己少年时代所读的“课外书”。请你回答下列问题。\n（1）在《水浒传》和《西游记》中任选一部作品，结合该书某些内容说说其对毛泽东产生了何种影响。（3分） _____________________________________________________________________________________________ _____________________________________________________________________________________________\n（2）结合《红星照耀中国》的具体内容，说说上题你选择的书籍对毛泽东产生某一方面的影耀响的印证。（3分） _____________________________________________________________________________________________ _____________________________________________________________________________________________ 三、作文（45+3分）", "语文_2023_23_1_.jpg", 8, "语文_2023"], [2023, "23(2)", "简答题", "难", "名著内容理解、红星照耀中国、印证分析", "23、读书分享。 我熟读经书，可是不喜欢它们。我爱看的是中国旧小说，特别是关于造反的故事。我很小的时候，尽管老师严加防范，还是读了《精忠传》《水浒传》《隋唐》《三国》和《西游记》。这位老先生讨厌这些禁书，说它们是坏书。我常常在学堂里读这些书，老师走过来的时候就用一本正经书遮住。大多数同学也都是这样做的。许多故事，我们几乎背得出，而且反复讨论了许多次。关于这些故事，我们比村里的老人知道得还要多些。他们也喜欢这些故事，常常和我们互相讲述。我认为这些书大概对我影响很大，因为是在容易接受的年龄里读的。（选自埃德加·斯诺《红星照耀中国》） 上面的文字是毛泽东接受斯诺采访时自述自己少年时代所读的“课外书”。请你回答下列问题。\n（1）在《水浒传》和《西游记》中任选一部作品，结合该书某些内容说说其对毛泽东产生了何种影响。（3分） _____________________________________________________________________________________________ _____________________________________________________________________________________________\n（2）结合《红星照耀中国》的具体内容，说说上题你选择的书籍对毛泽东产生某一方面的影耀响的印证。（3分） _____________________________________________________________________________________________ _____________________________________________________________________________________________ 三、作文（45+3分）", "语文_2023_23_2_.jpg", 8, "语文_2023"], [2024, "19", "简答题", "中", "名著内容理解、阅读体验表达", "19.某种意义上说，经典名著具有“定位功能”，可以指引方向。请从备选名著中任选一部，结合名著内容与成S长体验，加以简述。(6分) 备选名著：《红星照耀中国》《西游记》《简·爱》《经典常谈》 ___________________
