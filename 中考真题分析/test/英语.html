.left{flex:0.95;min-width:0;display:flex;flex-direction:column}

#detail .kps{margin-bottom:8px}
#detail .bar{margin-bottom:8px}

.qbox .q{font-size:15px;line-height:1.7;white-space:pre-wrap}
.qimg{max-width:100%;height:auto;display:block;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:zoom-in}
.ph{color:var(--mut)}

.lb{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;z-index:60;overflow:auto;padding:28px}

.pdf-bar{position:fixed;top:0;left:0;right:0;height:46px;background:#1a1a1a;color:#eee;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:71;font-size:14px}
.pdf-x{background:#fff;color:#111;border:0;border-radius:18px;padding:5px 14px;font-size:14px;font-weight:600;cursor:pointer}
#pdfv{position:absolute;top:46px;left:0;right:0;bottom:0;width:100%;border:0;background:#fff}
.kp{display:inline-block;background:color-mix(in srgb,var(--c) 14%,transparent);color:var(--c);border-radius:10px;padding:1px 8px;font-size:12.5px;margin:2px 3px 0 0}

is exhibiting her photographic Works in Shenzhen. Visitors can find photos on different themes. Entry is free. Dates: Until July \n30. Venue: TC101 Exhibition Hall, 2001 Longxiang Boulevard, Longgang District. Metro: Line 3 to Universiade. Station, ExitC. Future Art Chinese artist Sun Fangping is exhibiting his works. Organizers hope that this series of exhibitions will explore the direction and value of the future of art. Dates: Until August \n31. Venue: Zhi Art Museum, Song&#x27; an Road Bao&#x27; an District. Metro: Ling 11 to Houting Station, Exit A and then take a taxi.\n（1）Which line can you take to enjoy Cassie Chen&#x27;s Photos?\n　　A． Line \n11.\n　　B． Line \n4.\n　　C． Line3.\n　　D． Line \n1.\n（2）In which district can you visit Future Art?\n　　A． Nanshan DistrictB．Futian District\n　　C． Longgang DistrictD．Bao&#x27;an District\n（3）Which exhibitions can you choose if you are free on August 15?\n　　A． Contemporary Art and Future ArtB．Cassie Chen&#x27;s Photos and Future Art.\n　　C． Contemporary Art and Frank Yang&#x27;s ArtworksD．Frank Yang&#x27;s Artworks and Cassie Chen&#x27;s Photos\n（4）Where is the text probably taken from?\n　　A． A novelB．A story book\n　　C． A newspaperD．A science magazine", "", 0, "英语_2020"], [2020, "阅读18", "阅读理解", "中", "细节理解、推理判断、标题归纳、主旨大意", "18．阅读理解 &quot;Miss Smith! What rough (粗糙的) hands Mary Jessup has! &quot;said Daisy Marvin, as she walked home from school with her teacher. &quot;In my opinion, Daisy, Mary&#x27;s hands are the prettiest in our class&quot; &quot;Why? Miss Smith, they are as red and hard as they can be. How they would look if she tried to play on a piano! &quot;Daisy said. Miss Smith took Daisy&#x27;s hands in hers, and said, &quot;Your hands are very soft and white, just the hands to look beautiful on a piano; yet they don&#x27;t have one beauty that Mary&#x27;s hands do .Shall I tell you what the difference is?” &quot;Yes, please, Miss Smith.&quot; Daisy looked at Miss Smith, with eyes wide open. &quot;Will, Daisy, Mary&#x27;s hands are very busy. They wash dishes; they make fires; they hang out clothes, and help to wash them, too; they are always trying to help her poor, hard-working mother.&quot; Miss Smith continued, &quot;Besides, they wash and dress the children; they mend their toys and dress their dolls; yet, they find time to bathe the head of the little girl who is so sick in the next house to theirs.&quot; &quot;They do good deeds (行为) to every living thing. I have seen them patting the tired horse and the homeless dog in the street. They are always ready to help those who need help.&quot; &quot;I shall never think Mary&#x27;s hands are ugly any more, Miss Smith.&quot; Daisy said that with tears in eyes. &quot;I am glad to hear you say that, Daisy; and I must tell you that they are beautiful because they help others gladly and cheerfully.&quot; &quot;Oh, Miss Smith! I feel so ashamed of myself and so sorry, &quot;said Daisy, looking into her teacher&#x27;s face with shining eyes. “My dear, beauty doesn&#x27;t lie in how one looks but what he does.&quot;\n（1）What did Daisy think of Mary&#x27;s hand at first?\n　　A． WarmB．UglyC．DirtyD．Soft\n（2）What is beauty in Miss Smith&#x27;s opinion?\n　　A． Being patient.\n　　B． Being good-looking.\n　　C． Being helpful.\n　　D． Being hard-working.\n（3）What can we infer (推断) from the passage?\n　　A． Mary&#x27;s mother was lazy.\n　　B． Mary lived a comfortable life.\n　　C． Miss Smith disliked Daisy,\n　　D． Daisy understood beauty better.\n（4）What is the best title for the passage?\n　　A． Busy DaysB．Cheerful Tears\n　　C． Shining EyesD．Beautiful Hands", "", 0, "英语_2020"], [2020, "阅读19", "阅读理解", "中", "细节理解、词义猜测、事件排序、推理判断", "19．阅读理解 When Chinese people talk about Chinese tea culture today, they won&#x27;t miss an important person in Chinese history-Lu Yu, respected as a &quot;Sage of Tea (茶圣)&quot; for his achievements in the Chinese tea culture. He is best-known for The Classic of Tea, the first work on growing, making and drinking tea. Lu was born in Jingling in 733\n　　A. \n　　D. As a child, he became a student of Zou Fuzi. Thanks to his teacher&#x27;s guidance, he learnt a lot. He often made tea for his teacher. He also took care of his fellow students&#x27; health using his knowledge on tea and herbs (草药) . Lu Yu often went to the countryside to gather tea leaves and herbs. On one of those trips, Lu Yu found a spring. The water was quite clear and clean. When Lu made tea with this spring water, he found the tea tasted better than usual. From then on, he realized the importance of water quality in making tea. In 752\n　　A. D, Lu Yu finished his studies and returned to Jingling, where he met Cui Guofu. Both men shared the same interests in tea, literature (文学) and poetry. They soon became good friends. Since then, the two spent much time travelling, drinking tea and writing poems together. This period was important to Lu Yu as a man of literature. Culi, with his rich experience and skills in writing, became a coach of Lu. He provided necessary help with Lu&#x27;s writing. It was during this time that Lu finally wrote the amazing work, The Classic of Tea.\n（1）What is Lu famous for?\n　　A． Having wisdom.\n　　B． Respecting teachers.\n　　C． Caring for friends.\n　　D． Influencing tea culture.\n（2）What does the underlined word &quot;guidance&quot; in Paragraph 2 probably mean?\n　　A． HelpB．StressC．ProtectionD．Control\n（3）Why did Lu and Cui become good friends?\n　　A． They had the same hobbies.\n　　B． They lived in the same place.\n　　C． They spent much time together.\n　　D． They had the same experiences.\n（4）Which of the following is the correct order according to the passage? ①Lu Yu wrote The Classic of Tea.②Lu Yu became a student of Zou Fuzi. ③Lu Yu made friends with Cui Guofu.④Lu Yu found water quality was important.\n　　A． ②③①④\n　　B． ②④③①\n　　C． ④①③②\n　　D． @②③①", "", 0, "英语_2020"], [2020, "阅读20", "阅读理解", "中", "细节理解、推理判断、写作意图、主旨大意", "20．阅读理解 Teens and kids are reading a lot less for fun, according to a recent report. Although the decline (下降) in the past ten years is very surprising for teen readers, some data (数据) in the report shows that reading is still a big part of many children&#x27;s lives. According to the report, the number or teens who hardly read has gone up from 8 percent to 25 percent today. The report data shows that kids&#x27; reading ability remains almost the same. However, the amount of reading time has fallen, from about an hour every day to half an hour. As for children&#x27;s e-reading, the report mentions little about its effects. But it says that many parents choose to control the time spent on e-books, mainly because they are worried about the increased screen time. After all, it is important to protect their kids&#x27; eyes. The most helpful part in the report is parents&#x27; effects on their children. It shows that parents are examples and important guides for them in reading. If parents read more and find more time如o read with their children, it turns out that their children actually read more often. As summer vacation arrives, parents might take this chance to step in, make a reading list and enjoy the pleasant family reading time.\n（1）What do we know about children&#x27;s fun reading time?\n　　A． It is much shorter.\n　　B． It stays the same.\n　　C． It is much longer.\n　　D． It changes a little.\n（2）Why do many parents control e-reading?\n　　A． It can waste kids&#x27; time.\n　　B． E-books are not so important.\n　　C． It can harm kids&#x27; health.\n　　D． E-books are a waste of money.\n（3）How should parents encourage children&#x27;s reading?\n　　A． By making reading plans.\n　　B． By setting good examples.\n　　C． By praising kids&#x27; reading.\n　　D． By offering different books.\n（4）What&#x27;s the writing purpose of the last paragraph?\n　　A． To prevent e-reading.\n　　B． To encourage family reading.\n　　C． To advise family trips.\n　　D． To describe vacation pleasure.", "", 0, "英语_2020"], [2020, "阅读21", "阅读理解", "中", "细节理解、代词指代猜测、段落主旨、推理判断", "21．阅读理解 The Taojinshan Greenway (绿道) in Shenzhen has been open to citizens since July, 2019. Sitting at the west side of Shenzhen Reservoir, it is as long as \n7.07 kilometers. With plants along both sides and lakes lying at different sites, tourists can enjoy wonderful scenery all the way. If they are tired, they are free to take a rest at the 3 stops that were built for breaks. Additionally, five unused guard posts (岗享) along the old route have remained. They serve as sightseeing platforms for visitors to feel the cultural spirit behind the place. Of all its 13 scenic spots, 8 were designed to have Al helpers. From them, visitors can gain information on parking, tour guide services and more. The smart greenway, with free Wi-Fi available, also provides environmental date, such as temperature, wind speed and air quality. What&#x27;s more, it can give visitors wamings of coming extreme (极端的) weather and natural disasters, including rainstorms and typhoons that may hit Shenzhen. &quot;Started in the middle of 2015, the building process of the Taojinshan Greenway has taken good care of de wildlife and environment nearby&quot; said Yang Shiming, an offcial in charge of the project.&quot; The greenway is an example of construction projects without doing harm to the nature. It also shows the role that technology plays in building a smart greenway for more life convenience.&quot;\n（1）How long did it take to finish the Taojinshan Greenway?\n　　A． About 3 yearsB．About4 years.\n　　C． About 5 yearsD．About 6 years.\n（2）What does the underlined word &quot;They&quot; in Paragraph 2 refer to?\n　　A． Views.\n　　B． Visitors.\n　　C． Stops.\n　　D． Guard posts.\n（3）What is the main idea of Paragraph 3?\n　　A． What Al helpers do.\n　　B． Technology changes life,\n　　C． How Al helpers work.\n　　D． Technology protects humans.\n（4）What can we learn from this passage?\n　　A． It is interesting to use Al helpers.\n　　B． It is important to build greenways.\n　　C． It is possible to balance nature and construction.\n　　D． It is unnecessary to worry about terrible weather.", "", 0, "英语_2020"], [2021, "阅读11-25", "阅读理解", "中", "细节理解、推理判断、词义猜测、主旨大意与标题、文章出处判断、篇章结构判断", "二、阅读理解（共15小题，每小题2分） 阅读理解 Shashiyu was once a poor village in Hebei Province, but now it has changed into a rich and livable place. In the 1940s, villagers in Shashiyu had little food and few clothes, but they had a strong wish for a better life. Zhang Guishun, the Party secretary of Shashiyu, encouraged his villagers to do their best to pull themselves out of poverty. &quot;In the ancient Chinese story, Yu Gong could move mountains with his strong will and hard work, why can&#x27;t we? Nobody was born to be poor?&quot; Hearing his words, the villagers decided to make a difference. Led by the Communist Party of China (中国共产党), the villagers carried water and soil to their village from faraway places to improve their land. From 1966 to. 1971, they reclaimed (开垦) lots of land and greatly improved their life. However, the village encountered a new problem two decades later as the environment became heavily polluted by chemical plants and mine refineries built in 1990s. The polluting factories were shut down in 2004, and villagers started grape cultivation, which soon became a main industry in Shashiyu. In 2009, the city-level government invested over 1 million yuan(＄152, 723) to change the village&#x27;s exhibition hall into a museum in memory of development efforts made by earlier generations. After 10 years, the village was called &quot;National Forest Village&quot;. Zhang said that the village started a yearly tourism festival in 2015 to attract travelers to pick grapes. &quot;The grapes could be sold at a better price once Shashiyu becomes famous through this festival. Our villagers can then live even better lives, &quot;he said. \n11．Why did Zhang Guishun use the story of Yu Gong to encourage the villagers?\n　　A． Because Yu Gong had strong will and hard work.\n　　B． Because Yu Gong was born poor too.\n　　C． Because the villagers worshiped Yu Gong.\n　　D． Because Yu Gong became rich at last. \n12．From 1966 to 1971, what did the villagers do to improve their living situation?\n　　A． They planted grapes to earn money.\n　　B． They carried water and soil to their village to improve their lands.\n　　C． They moved to another place to live a better life.\n　　D． They built a lot of factories. \n13．Which word can be used to describe the villagers?\n　　A． Hard-working.\n　　B． Lazy.\n　　C． Kind-hearted.\n　　D． Stupid. \n14．When was Shashiyu called &quot;National Forest Village&quot;?\n　　A． In 2009.\n　　B． In 2004.\n　　C． In 2015.\n　　D． In 2019. \n15．Wh…（篇幅所限已截断）", "", 2, "英语_2021"], [2021, "书面表达46", "书面表达", "中", "提纲作文(新闻报道)、记叙文写作、一般过去时运用、活动描述与亮点表达、逻辑连贯与篇章结构", "六、书面表达（15分） \n46．深圳是一座科技之城、创新之城，为培养学生对科技的兴趣，你的学校上周举办了科技节。假定你是你校英语报的小记者，请你编写一篇新闻报道，介绍这次活动。 要点∶ 1）活动目的 2）活动项目∶①模型制作比赛② 3）活动亮点∶学生发明的服务于校园的机器人=（外表, 功能） 4）学生感受 提示词∶ 1）科技节 science festival 2）实验 experiment Shenzhen is well-known as a city of technology and innovation. Last week,", "", 0, "英语_2021"], [2022, "阅读11-15", "阅读理解", "中", "细节理解、推理判断、文章主旨与文体判断", "二、阅 读 理 解(共15小题，每小题\n1.5分) 阅下列短文，从下面每小题所给的\n　　A、 \n　　B、 \n　　C、 D 四个选项中，选出最佳选项。 At 9 o&#x27;clock on December 10th, 2021, with the sound of a whistle(哨), train G2197 slowly ran out of Ganzhou West Station and headed south to Shenzhen North Station. This marked the opening of the Ganzhou-Shenzhen high-speed railway, which includes 14 stations, with a total length of 436 kilometers. The total travel time between the two cities has been cut from 6 hours to 2 hours. The building of the Ganshen high-speed railway was filled with challenges. As the railway travels through the mountainous areas of southern Jiangxi and northern Guangdong, workers had to be careful with many cultural landscapes(风景)and protection areas. When it was completed, 323 bridges and 157 tunnels( 隧 道 )were built, taking up 90% of the total length. By taking the new route, it is convenient for passengers to visit the beautiful places along the line. For example, you can walk into the Shenzhen Museum to review the city&#x27;s development, go to Heyuan to experience the amazing Wanlv Lake, or explore the ancient Tongtian Rock Caves in Ganzhou. Ganzhou is known as the &quot;Orange Capital of the World&quot;. With the high-speed railway&#x27;s operation, more travellers from Guangdong have arrived and Ganzhou oranges are getting more popular. &quot;It used to take me six hours to drive home on Fridays, but now I can get home in time to pick up my child from school. What&#x27;s more, I can even drop him off at school on Monday mornings before I go to work, &quot;said Chen Yu, a Ganzhou local who works in Shenzhen. Chen&#x27;s life is a typical one that has changed with the railway. More and more wonderful changes along the high-speed railway are taking place. \n11．How many hours can we save from Ganzhou to Shenzhen by G2197?\n　　A． 2.\n　　B． 4.\n　　C． 6.\n　　D． 8. \n12．What can we learn from paragraph 2?\n　　A． The tunnels cover 90 % of the railway.\n　　B． It was very difficult to build the railway.\n　　C． 157 bridges were built along the railway.\n　　D． The railway passes through northern Jiangxi. \n13．What is the purpose of paragraph 3?\n　　A． To introduce places of interest.\n　　B． To share travelling experiences.\n　　C． To review the history of Ganzhou.\n　　D． To celebrate the success of Shenzhen. \n14．What do we know about Chen Yu?\n　　A． He is an orange farmer.\n　　B． He is a local in Shenzhen.\n　　C． His child lives in Ganzhou.\n　　D． His working place has changed. \n15．What ki…（篇幅所限已截断）", "", 2, "英语_2022"], [2022, "阅读16-20", "阅读理解", "中", "细节理解、推理判断、代词指代、词义猜测", "阅下列短文，从下面每小题所给的\n　　A、 \n　　B、 \n　　C、 D 四个选项中，选出最佳选项。 I took up baking(烘焙)when I was twelve. At that time I was working on my school bakery project with my classmates. I tried a few times, but I wasn&#x27;t very successful. My parents. advised I learn from my grandmother, who later gave me her recipe(食谱)and instruction as well. After two years&#x27; practice, I was able to make delicious bread. I have come to realize making bread means a lot to me although it takes a long time. To make bread, others usually use quick-rise yeast(酵母), but I don&#x27;t. Every Saturday morning, after mixing proper amount of water with flour, sugar etc, I take time to wait for the dough to rise. This is my way to slow down and smell the roses. Baking does require great patience. In my hands, the dough is slowly growing. It&#x27;s becoming softer. I can feel the change, which connects me to something quite different from the modern way of living. To me, making bread is a push against our culture of convenience. It certainly takes more time than buying bread from a store, but I enjoy it. I&#x27;ve stuck with my grandmother&#x27;s recipe without making any change. Now this tradition has continued for years. Sometimes, in order to fit it in, I have to change my schedule. But I have never considered giving it up. By the time my children get home from school, the bread has been baked and cooled. They step into the house and the first thing they do is to take a deep breath of the warm, honeyed air. My bread-baking has also helped them to slow down and understand the value of taking their time and leading an unhurried life. \n16．Who taught the writer to make bread?\n　　A． Her teacher.\n　　B． Her grandmother.\n　　C． Her parents.\n　　D． Her classmates. \n17．How is the writer&#x27;s bread-making different from others&#x27;?\n　　A． She uses less water.\n　　B． She uses more sugar.\n　　C． She doesn&#x27;t bake it a long time.\n　　D． She doesn&#x27;t add quick-rise yeast. \n18．Which word best describes life in modern times according to the writer?\n　　A． Relaxing.\n　　B． Exciting.\n　　C． Fast.\n　　D． Happy. \n19．What does the underlined &quot;it&quot; in paragraph 4 refer to?\n　　A． The recipe.\n　　B． The plan.\n　　C． The change\n　　D． The tradition. \n20．What does the writer want to teach her children to do?\n　　A． Do things in a slow way.\n　　B． Bake bread at an early age.\n　　C． Be thankful for parents&#x27; work.\n　　D． Get home from school in time.", "", 3, "英语_2022"], [2022, "阅读21-25", "阅读理解", "中", "细节理解、词义猜测、主旨大意与标题归纳", "阅读理解 The giant Amazon rainforest in South America has been a mystery for centuries. It holds all kinds of natural wonders. Among them in Colombia, a river stands out as &quot;the most beautiful river&quot; in the world. Locally called Carnio Cristales, this special river lies in a national park. It is made up of several waterfalls, rapids, and plenty of pools. For most of the year, Canio Cristales looks like a common river: clean, green, and rocky. However, during the short period between September and November, the river explodes(迸发)with life and colour It appears as any mix of colours including blue, green, yellow, orange, and a purplish red. So it is also known as the &quot;River of Five Colours&quot;. Although at first it may appear as if some chemicals were added to the water, this rainbow river is completely natural. Cafio Cristales&#x27; colours are the result of a rare (稀有) water plant which needs sunlight to grow. The plants change colour depending on how much sunlight they receive, and the amount is decided by the height and speed of the water. Therefore, it is possible for the plants to be totally colourless if the sunlight is too hard to get. They are a delicate plant. This makes them easily damaged in the water. Actually, the river faces some problems, including drier seasons, wildlife trouble, waste management, and budget( 预 算 )cuts. In 2007, the park was forced to close because it was over-crowded with tourists. Now the park admits only 200 people a day and requires them to mind their behaviour. Today, Cano Cristales still shines among Colombia&#x27;s most popular natural attractions, drawing thousands of tourists every year. \n21．When is the best time to visit Cafio Cristales?\n　　A． In January.\n　　B． In March.\n　　C． In June.\n　　D． In October. \n22．Why is Cano Cristales colourful?\n　　A． A special plant lives in it.\n　　B． People add chemicals to it.\n　　C． The water is badly polluted.\n　　D． The weather is changeable there. \n23．What does the underlined word &quot;delicate&quot; in paragraph 3 probably mean?\n　　A． Special.\n　　B． Weak.\n　　C． Lively.\n　　D． Beautiful. \n24．What once caused the park to be closed?\n　　A． Too many visitors.\n　　B． The poor service.\n　　C． Too much rubbish.\n　　D． The wildlife problem. \n25．What is the best title of the text?\n　　A． How to Visit Cano Cristales\n　　B． Natural Beauty in. Colombia\n　　C． World&#x27;s Most Beautiful River\n　　D． Protecting the River of Five Colours", "", 4, "英语_2022"], [2023, "阅读A11-15", "阅读理解", "中", "细节理解、代词指代、推理判断、情感态度", "A Matt and his mum lived in the country next to a huge forest. There were trees and birds everywhere. They went walking in the forest every weekend. They looked for birds, found feathers and picked berries. Matt thought he lived in the best place in the whole world. But, at the start of spring, everything changed. His family moved to the city as his mum found a new job. There was no forest in the neighbourhood, and that made Matt sad. Mrs. Potter, Matt&#x27;s new neighbour, was an old lady who lived alone. One day, Matt saw her carrying a pot into the building. It seemed a bit heavy, so Matt helped carry it to her home. Once Mrs. Potter opened the door, Matt was amazed at the view in front of him. It was a forest, but it wasn&#x27;t like any forest he had seen before. There were many trees-real ones. But each one was in a pot. They were everywhere in the room. Matt felt as if he was in a fairy land. &quot;I see you like my indoor forest,&quot; said Mrs. Potter. &quot;They are beautiful,&quot; said Matt. &quot;Would you like to take some trees home? Thank you so much for helping me today,&quot; said Mrs.Potter. &quot;Yes, please!&quot; said Matt, excitedly. Mrs. Potter gave Matt two potted (盆栽的) trees. She showed him how to care for the trees. Matt kept them on his balcony (阳台). One day, he saw something moving below the trees. It was a fat blackbird eating the berries of the trees! Matt smiled. He felt like he was living beside a forest again. What did Matt and his mum do in the forest?\n　　A. They took a walk.\n　　B. They planted trees.\n　　C. They drew a picture.\n　　D. They watered flowers. What does the underlined &quot;that&quot; in paragraph 2 refer to?\n　　A. Spring was arriving.\n　　B. Mum got a new job.\n　　C. There was no forest around Matt&#x27;s new home.\n　　D. There was no change in Matt&#x27;s life in the city. What can we learn about Mrs. Potter&#x27;s home?\n　　A. Her home was in the country.\n　　B. There were a lot of trees in her home.\n　　C. Her home was old and broken.\n　　D. There were many people living in her home. How did Mrs. Potter thank Matt?\n　　A. By taking care of Matt.\n　　B. By giving Matt two trees.\n　　C. By greeting Matt on her balcony.\n　　D. By carrying a pot to Matt&#x27;s home. How did Matt probably feel when he saw the blackbird?\n　　A. Tired.\n　　B. Lonely.\n　　C. Relaxed.\n　　D. Happy.", "", 3, "英语_2023"], [2023, "阅读B16-20", "阅读理解", "中", "细节理解、段落大意、人物品质归纳、标题归纳", "B With more than 30 years of tireless effort, China finally made history in an international chess competition this year. On April 30, Ding Liren took the crown of the World Chess Championship (锦标). He beat the Russian player Ian Nepomniachtchi when the Russian made a serious mistake in the final match. Ding became the new world chess champion and also the first Chinese male (男子) player to win the title. His victory means that China now holds both the men&#x27;s and women&#x27;s world titles in chess. Before him, Xie Jun first won women&#x27;s world title in 1991. From then on, Chinese chess players have made great progress on the world stage. As the 17th winner of the championship with a history of 137 years, Ding showed a gift for chess from an early age. Born in Wenzhou, the &quot;chess city&quot; of China, Ding began learning to play chess when he was little. At the age of five, he won his first national title. When he was seventeen, he beat several experienced masters to win the chess championship of China. Ding is called Silent Storm. He is a man of few words, with unusual skills of calculation. He often beats other players at lightning speed, while remaining calm. Although he has long been a big star in the chess world, he is humble (谦逊的). He learns from his mistakes and is always ready to talk about his problems. Ding hopes that after his big win, more and more young people in China will take an interest in chess. What can we learn from paragraph 2?\n　　A. Ding Liren made a mistake in the final match.\n　　B. Xie Jun won men&#x27;s World Chess Championship.\n　　C. Ding Liren made history as a Chinese chess player.\n　　D. Chinese chess players made little progress after 1991. In which year was the first World Chess Championship held?\n　　A. 1886.\n　　B. 1961.\n　　C. 1993.\n　　D. 2006. What is paragraph 3 mainly about?\n　　A. The stories of Ding&#x27;s life and family.\n　　B. The popularity of chess in Wenzhou.\n　　C. The history of the chess championship.\n　　D. The development of Ding&#x27;s chess career. Which words best describe Ding Liren?\n　　A. Quiet and smart.\n　　B. Proud and caring.\n　　C. Active and helpful.\n　　D. Friendly and humorous. What is the best title for the passage?\n　　A. Chinese Took a Greater Interest in Chess\n　　B. Ding Liren Became the New King of Chess\n　　C. Xie Jun and Ding Liren Brought Honour Home\n　　D. Chinese Chess Players Have Worked Hard for Long", "", 4, "英语_2023"], [2023, "阅读C21-25", "阅读理解", "中", "细节理解、写作意图、推理判断、词义猜测、篇章结构", "C There&#x27;s no better way to start the holidays than with a holiday movie. The storylines of these movies are often silly, and easy to understand. The characters are not reasonable enough. The plot moves too fast to be realistic. Even so, the happy endings make you feel enjoyable. And as it turns out, there are reasons behind the joy you get from watching them. Holiday movies are usually relaxing. Watching them is good for our physical health. According to a study published in 2020 in the book Nostalgia. Now, holiday movies can lower stress hormones (荷尔蒙) and increase cardiovascular (心血管的) health because the movies are always full of fun. Holiday movies do more than just benefit our body. They can improve our mental (心理的) health as well. Courtney Cope, a scientist, once said, &quot;When it comes to holiday movies, we know they are always going to work out in the most positive way. It&#x27;s a nice vacation from reality for our minds.&quot; In fact, when we are watching these movies, we imagine ourselves living in a perfect world. Besides, holiday movies enable us to see things in a new way, or feel encouraged to make a difference. We often see characters that we respect overcome all kinds of difficulties. The movies serve as a reminder that even in the worst of times, there is always hope. Moreover, most holiday movies are family-friendly. When we watch them with others, we create shared memories and strengthen relationships. The laughter and joking about an unrealistic movie create a positive bonding experience, which makes us feel closer and &quot;home&quot; for the holidays. The shared memories and experiences make the holidays more meaningful. What can we learn about holiday movies from paragraph 1?\n　　A. They tell realistic stories.\n　　B. The characters are clever.\n　　C. They have happy endings.\n　　D. The storylines are hard to follow. Why does the writer mention the study in paragraph 2?\n　　A. To bring up a new idea.\n　　B. To compare different facts.\n　　C. To call for further studies.\n　　D. To provide scientific support. What can we infer from Courtney Cope&#x27;s words?\n　　A. People enjoy going on vacation with family.\n　　B. The characters in the movies are role models.\n　　C. Our minds like the relaxing break from reality.\n　　D. Holiday movies remind us of the difficult times. What does the underlined word &quot;bonding&quot; in paragraph 5 probably mean?\n　　A. Working.\n　　B. Waiting.\n　　C. Learning.\n　　D. C…（篇幅所限已截断）", "", 5, "英语_2023"], [2023, "阅读还原26-30", "阅读理解", "中", "句子还原、上下文逻辑、篇章衔接与连贯", "第二节 阅读下面短文，从方框里的六个句子中选择五个还原到原文，使原文的意思连贯、完整。（共 5 小题，每小题 2 分） 方框句子：\n　　A. Fans have many advantages.\n　　B. They also use less electricity.\n　　C. All air conditioners work similarly.\n　　D. That is why you need to stay near a fan while using it. E. In this situation, you&#x27;d better turn on an air conditioner. F. Many people have wondered: Which one is more useful? A long heat wave hit Europe last summer. The temperature reached 40℃. While both electric fans and air conditioners can help beat the heat, a comparison between the two has never stopped. \n26. In most cases, an electric fan is able to get the job done. \n27.Most of them take no time to set up. They can be easily carried around in a room. Electric fans are much cheaper than air conditioners. \n28.You could leave a fan running for 24 hours and still use less energy than two hours of air conditioning. But fans and air conditioners work in quite different ways. An electric fan doesn&#x27;t cool the air in your home. It leaves you feeling cooler by moving the air around so that your sweat (汗) dries up faster. \n29. In comparison to fans, air conditioners can lower the temperature of the whole room. When you have your air conditioner on, you can feel its effect from wherever you stand. In short, electric fans can work wonders in summer and they are better for the environment. But turning on a fan doesn&#x27;t make much difference when the temperature is above 35℃. \n30.You should also use an air conditioner when you are sharing your room with others.", "", 6, "英语_2023"], [2024, "阅读11-15", "阅读理解", "中", "细节理解、推理判断、主旨大意", "When he was a teenager, Hunter Adams was very unhappy and he spent many years in a special hospital for people with mental (精神的) health problems. When he left the hospital, Adams decided to become a doctor, so he went to a medical school in Virginia, the USA. But when he was there, he did things in a different way. For example, he didn&#x27;t like the doctors&#x27; white coats, so he wore shirts with flowers on them when he visited his patients and he tried to make them laugh. The doctors at the medical school didn&#x27;t like Adams because he was too different. But Adams believed that people in hospital need more than medicine. He saw unhappy and lonely people, and he tried to help them. He spent a lot of time with children in hospital and often dressed up like a clown to make the children laugh. When he finished medical school and became a doctor, Adams opened his own hospital, called &quot;The Gesundheit Institute&quot;, together with some other doctors. They wanted it to be a place with a different way of working with sick people. Hunter Adams became famous during the 1980s, and in 1998, Universal Pictures made a film about his life. It was very successful. In the film (called Patch Adams), Robin Williams played Adams. Williams said, &quot;Adams is a really warm person, who believes that patients need a doctor who is a friend. I enjoyed playing him.&quot; \n11．When did Adams have mental health problems?\n　　A． After he left medical school.\n　　B． During the 1980s.\n　　C． When he was a teenage boy.\n　　D． After the film came out. \n12．Why did the doctors at the medical school dislike Adams?\n　　A． Because he was a warm person.\n　　B． Because he had mental health problems.\n　　C． Because he was a clown.\n　　D． Because he wasn&#x27;t the same as others. \n13．The Gesundheit Institute ____.\n　　A． was a hospital\n　　B． belonged to Universal Pictures\n　　C． could make films\n　　D． was a medical school \n14．According to the passage, which statement is NOT true?\n　　A． Adams wore shirts instead of white uniforms when visiting patients.\n　　B． Robin Williams believed that patients need a doctor who is a friend.\n　　C． In Adams&#x27; opinion, not only medicine was needed for patients.\n　　D． Robin Williams was an actor. \n15．The passage mainly tells us about ____.\n　　A． how to cheer up patients\n　　B． people with mental health problems\n　　C． a film about Adams\n　　D． a doctor named Hunter Adams", "", 2, "英语_2024"], [2024, "阅读16-20", "阅读理解", "中", "细节理解、推理判断、词义猜测、写作意图与文章主旨", "After a 10-year project to count tuna and other large fish in the world&#x27;s oceans, scientists have made a very surprising discovery: these fish are almost gone. Because of too much fishing, almost 90 percent of the worldwide population of large fish—the ones we usually eat—has disappeared. If we don&#x27;t act, these animals will totally disappear. That will influence every animal in the ocean. The demand for fish is growing. Almost a billion people around the world get their protein (蛋白质) mostly from fish. Doctors praise seafood for being low in fat. But what seems like a healthy choice for humans is causing a disaster to our oceans. &quot;People are consuming (消费) too much,&quot; says Lance Morgan, a scientist at the Marine Conservation Biology Institute. A dish of tuna in restaurants costs more than just one animal&#x27;s life. When fish like tuna disappear from the ecosystem (生态系统), the ocean&#x27;s food chain (链) breaks down. Animals such as sharks, which normally eat tuna, may die because they find no food. The news may be scary, but taking action from now on can prevent harm that hasn&#x27;t happened yet. World organizations are ordering countries to stop fishing too much. The Monterey Bay Aquarium gives seafood choices to anyone hoping to keep healthy without destroying the environment. &quot;If you care about wildlife, first spend time and think about your own values and beliefs,&quot; says Morgan. &quot;Then decide what you&#x27;re going to eat.&quot; \n16．How does the writer start the text?\n　　A． By giving a fact.\n　　B． By asking a question.\n　　C． By telling a story.\n　　D． By using a saying. \n17．What does the underlined word &quot;demand&quot; in Paragraph 2 probably mean?\n　　A． Wish.\n　　B． Support.\n　　C． Need.\n　　D． Price. \n18．From Paragraph 3, we know that ____.\n　　A． if sharks die out, tuna will die out soon\n　　B． tuna will be more popular in restaurants\n　　C． tuna plays an important role in the ecosystem\n　　D． tuna disappeared because they found no food \n19．What&#x27;s the purpose of the text?\n　　A． To tell people to stop polluting our oceans.\n　　B． To tell people to protect wildlife in oceans.\n　　C． To tell people to avoid eating too much seafood.\n　　D． To tell people to live a balanced and healthy life. \n20．What does the last paragraph of the article explain?\n　　A． We need to care about wildlife\n　　B． We need to eat wild animals\n　　C． We need to reflect on our own values and beliefs\n　　D． We don&#x27;t want to protect wild animals", "", 3, "英语_2024"], [2024, "阅读21-25", "阅读理解", "中", "细节理解、词义猜测、写作目的与主旨", "A recent TV series To the Wonder has become China&#x27;s breakout TV hit of the year. It has also won praise at a film festival abroad. To the Wonder is based on the award-winning novel of Li Juan, My Altay, and is directed by Teng Congcong. It is very poetic and filled with beautiful wisdom. The TV drama follows the journey of Li Wenxiu. She once wished to leave Altay, an area in Northern Xinjiang. After failing to realize her dream in the capital of Xinjiang, Li has to move back to her hometown and tries to find a new direction for herself. At first, Li finds it hard to understand her neighbours&#x27; traditional way of thinking. Under the influence of her mother Zhang Fengxia, Li starts to see the place and its people in a new light. Later, she comes to understand their lifestyle and respect for nature. Fans describe watching the drama as an experience in the wonderland. &quot;It&#x27;s like breathing in fresh air or lying under the sun,&quot; said one fan. &quot;It is a unique drama, very different from the usual Chinese series. A must-watch if you want to discover the beauty of the grassland and life there,&quot; another fan said. &quot;People enjoy the wonderful view of Altay. But the key to the success of the series lies in its ability to connect with the viewers on a human level,&quot; said Teng Congcong. &quot;In the drama, everyone communicates sincerely. Even if I disagree with you, I sincerely respect you. In fact, this is a very important part of human nature—the love for truth, goodness and beauty.&quot; \n21．To the Wonder is the name of ____.\n　　A． a foreign drama\n　　B． a famous film\n　　C． a TV series\n　　D． a beautiful poem \n22．Why does Li Wenxiu come back to Altay?\n　　A． To look after her mother.\n　　B． To find herself a new direction.\n　　C． To help the local people.\n　　D． To enjoy its beautiful view. \n23．The underlined word &quot;unique&quot; has the closest meaning to ____.\n　　A． serious\n　　B． common\n　　C． special\n　　D． strange \n24．What is the key to the success of To the Wonder according to Director Teng?\n　　A． Its sincere respect for nature.\n　　B． The beautiful wisdom of the writer.\n　　C． The lifestyle of the local people.\n　　D． Its sincere connection with viewers. \n25．What is the purpose of the text?\n　　A． Everyone communicates sincerely\n　　B． Life requires believing in miracles\n　　C． A love for truth, goodness, and beauty\n　　D． Sincerely respect you", "", 4, "英语_2024"]], "hovertemplate": "<b>%{customdata[0]}年 · %{customdata[1]}题</b><br>%{customdata[2]}　难度：%{customdata[3]}<br>知识点：%{customdata[4]}<extra></extra>"}, {"x": [85.8, 76.08, 67.3, 0.53, 61.69, 53.74, 56.43, 70.55, 63.45, 57.17, 62.73], "y": [2.82, 2.89, 7.85, 43.09, 2.07, 31.56, 8.62, 33.09, 14.26, 9.58, 33.35], "mode": "markers", "type": "scatter", "name": "簇3 词义辨析·上下文逻辑·动词短语辨析（11）", "marker": {"size": 9, "color": "#e15759", "line": {"width": 0.5, "color": "rgba(255,255,255,.6)"}, "opacity": 0.82}, "customdata": [[2020, "单选1-8", "单项选择", "易", "词义辨析、同义替换、短语辨析", "一、从下面每小题的\n　　A、 \n　　B、 C三个选项中选出可以替换划线部分的最佳选项。（每小题1分） \n1．—Tom, let&#x27;s go to play basketball. —I&#x27;d love to. But I have to complete my homework first.\n　　A． checkB．finishC．correct \n2．—Your English teac  simple tricks above, your photos will start coming out beautifully! Do not hesitate to go out with your friends and take more photos.", "", 5, "英语_2021"], [2022, "完形1-10", "完形填空", "中", "上下文逻辑、动词辨析、名词辨析、形容词辨析、副词辨析、动词短语辨析", "一、完形填空 (共10小题，每小题1分) 阅读下面短文，从短文后所给的\n　　A、 \n　　B、 \n　　C、 D 四个选项中选出能填入相应空白处的最佳选项。 From an early age, Ara loved watching the cows in the green fields in her village every day. When she was ten, she asked her parents if they could \n1． a cow. Her father thought it would take much work and suggested learning about cows from the \n2． in the community first. The first farm they visited was fantastic, which smelled fresh, like plants and rain. The cows were munching( 嚼 )on leaves, clean and smiling. They produced lots of tasty milk. However, the second farm was \n3． . The cows were smelly and covered in dirt. When Ara asked about the milk, the farmers shook their heads. That night, Ara couldn&#x27;t fall asleep, wondering what she could do to help the sad cows. Finally, she \n4． a plan with her parents. She asked the first farmers if they would help the second farmers, and they \n5． . Ara organized a meeting and the first farmers shared their \n6． . The advice they offered was so \n7． that everyone learned a lot. Weeks later, Ara found that the second farm was much cleaner. The farmers got more milk. They were thankful to Ara and willing to share tips with others. At the next meeting, Many more farmers \n8． . That evening, Ara&#x27;s father gave her a big hug and said, &quot;You have made a difference to our \n9． !&quot; Thinking about all the cows and people she helped, Ara smiled, though she didn&#x27;t own a cow in the end. &quot;One can create positive change to the world at any age, &quot;she thought \n10． , What will be your change to make? \n1．\n　　A． borrow\n　　B． keep\n　　C． find\n　　D． save \n2．\n　　A． parents\n　　B． teachers\n　　C． friends\n　　D． farmers \n3．\n　　A． large\n　　B． different\n　　C． fantastic\n　　D． modern \n4．\n　　A． fought against\n　　B． put 　　C． school\n　　D． village", "", 1, "英语_2024"], [2024, "阅读还原26-30", "阅读理解", "中", "六选五句子还原、上下文逻辑衔接、代词与连接词线索", "There are many humanistic monuments (人文古迹) and natural scenic spots (景点 ) in textbooks. Children are always interested in them, and they want to go there in person. \n26． This kind of tour allows parents and children to deepen their understanding of the scenes (场景) mentioned in the textbooks. Many families have taken part in the textbook tour. \n27． They can understand the cultural background and experience the historical period in the textbooks. For example, in Fuzhou, parents and children can watch lively shows and visit the museums to learn more about the famous writer Tang Xianzu in the Ming Dynasty. In addition, they can learn about the local customs. \n28． The textbook tour is a connection between &quot;reading thousands of books&quot; and &quot;travelling thousands of miles&quot;. \n29． Besides, the textbook tour further increases children&#x27;s pride in them other land. It also helps them learn about the excellent traditional culture of China. The rise of the textbook tour is a great chance for the connection between culture and tourism. For example, the Wen chuan government holds some activities on the birthday of Dayu. \n30． This spreads local culture and provides an unforgettable experience for tourists. As the text book tour becomes a new fashion, the government should offer warm services to achieve a win-win situation for both scenic spots and tourists.\n　　A. This further makes their journey colorful.\n　　B. That&#x27;s why the textbook tour has become popular these days.\n　　C. They follow the stories in the textbooks and choose places to travel.\n　　D. Cultural workers teach &quot;Dayu culture&quot; to tourists in these activities. E. Through the practice, children can have a deeper understanding of the textbooks. F. Textbooks can broaden my horizons.", "", 9, "英语_2024"]], "hovertemplate": "<b>%{customdata[0]}年 · %{customdata[1]}题</b><br>%{customdata[2]}　难度：%{customdata[3]}<br>知识点：%{customdata[4]}<extra></extra>"}, {"x": [56.27, 74.0, 64.73, 1.83, 67.26], "y": [93.22, 97.84, 94.55, 51.92, 100.41], "mode": "markers", "type": "scatter", "name": "簇4 信息匹配·细节理解·关键词定位（5）", "marker": {"size": 9, "color": "#76b7b2", "line": {"width": 0.5, "color": "rgba(255,255,255,.6)"}, "opacity": 0.82}, "customdata": [[2021, "信息匹配31-35", "阅读理解", "易", "信息匹配、关键词定位、细节理解、快速阅读", "四、信息匹配（共5小题，每小题1分） 阅读下面商品介绍，为五个人选出合适他们的物品。 A Future Astronaut Do you want to be an astronaut in the future? If you do, our club is your best choice! Here you can explore the universe and the unknown mystery behind it! B Cooking Lesson Are you good at cooking? Do you enjoy delicious food? Learn to cook inRoom401 every Tuesday. Come here for more information if you are interested in it. C English Corner Are you an English lover? Come and join our English corer It&#x27;s a good place for you to practice spoken English and share experience in learning English. D A Music Video Show Do you like music? You can have a great time in our music club. We&#x27;ll make a music video show together! E Basketball Club Do you like playing basketball? Welcome to join us! We&#x27;ll invite Yi Jianlian to playa basketball match with us. F Beijing Opera Lesson Do you want to learn Beijing Opera? Join us at Shenzhen Grand Theater! We&#x27;ll have teachers here to share professional skills. \n31．Justin is crazy about playing basketball and he is a huge fan of Yi Jianlian. \n32．Alice likes Indian food and Chinese food. She wants to learn to cook wonderful dishes. \n33．Jenny is fond of singing and dancing. She wants to playa role in a music video. \n34．Henry is interested in learning Beijing Opera. He wants to learn from teachers. \n35．Daniel shows great interest in space and hopes he will visit another planet one day.", "", 6, "英语_2021"], [2022, "任务型阅读31-35", "阅读理解", "易", "信息匹配、细节理解、需求与材料对应", "下面的材料A~F 是六门校本课程的介绍。请根据Kevin, Mandy, Brian, Ivy, Simon 五位同学的需求，为他们推荐合适的课程。\n　　A. Block Building Prepare to build your favorite &quot;adventures&quot;. Projects of Star Wars and Jurassic Park will be offered and knowledge will be explained. You can take home your own works.\n　　B. Robotic Science Have fun building and creating robots! You will learn engineering in an interesting way and many robot projects will be included. You can also join in an exciting competition.\n　　C. Chemical Magic Get ready for a&quot;magical&quot;lab experience in Harry Potter style! It is an introduction to chemistry and physics. Enjoy making coloured fire, hot ice, purple smoke and more.\n　　D. Photography Fun Expect to take a wonderful photo or shoot a video on your own? Come and find out the science behind movies. You will also learn the skills of photography using different cameras. E. First Aid Training What do you know about the things in the survival kit? Attend this course to learn how to use them in the right manner. Step-by-step treatment for medical emergencies will be shown. F. Arts and 3-D Printing Want to be an artist? Come and create your artworks! Projects, including sand art, painting and an introduction to CAD drawing and 3-D printing, will be carried out. \n31．Kevin wishes to develop a home-care robot which can look after his grandpa. \n32．Mandy wants to take beautiful pictures and record her family trips on holiday. \n33．Brian wonders how he can create coloured smoke for his play in English Week. \n34．Ivy is crazy about Leonardo da Vinci&#x27;s works. She dreams of becoming a painter. \n35．Simon has built several block models, He&#x27;s thirsty for model-building knowledge.", "", 6, "英语_2022"], [2023, "阅读匹配31-35", "阅读理解", "易", "信息匹配、细节理解、概括与对应", "第三节 下面的材料 A～F 是六项与劳动课程有关的介绍。请根据 Jack, Max, Lisa, Eddie, Jenny 五位同学的实际情况，为他们推荐合适的项目。（共 5 小题，每小题 \n1.5 分）\n　　A. Making Handicrafts (手工) Learn to make traditional handicrafts such as paper cuttings and Chinese knots (中国结) to make your home beautiful. It develops your hands-on skills.\n　　B. Doing Cooking Leam different cooking skills to make delicious meals. Try to cook meals by yourself and share them with your family. It improves your life skills.\n　　C. Community Nursing Centre Service Help the old people at the centre with dressing. Take them out for a walk and chat with them. You can help them develop a healthy lifestyle.\n　　D. Farming in the Garden Plant flowers, vegetables and fruit trees in the garden. You can get close to nature and learn more about plants and farming. E. Waste Separation Record the progress of the waste separation programme in the neighbourhood. You can help the government run this programme better. F. Job Shadowing (职业体验) Follow and learn from someone in their workplace for two weeks in the coming summer holiday. It may help you know more about your dream career. Jack wants to prepare a big meal for his father on Father&#x27;s Day. Max loves gardening. He also wants to learn how to grow vegetables. Lisa is a helpful girl. She wants to help look after the old in the community. Eddie is interested in engineering. He wants to experience the life of an engineer. Jenny wants to beautify her house with some traditional handicrafts during Chinese New Year.", "", 7, "英语_2023"], [2023, "书面表达", "书面表达", "中", "应用文写作、自荐信、智慧校园话题、议论与说明表达", "书面表达（15 分） 假定你是李华。下周五，新西兰教育考察团将访问你校，了解学校&quot;智慧校园&quot;的建设情况。学校委托外教 Mr.Brown 在学生中招募志愿者来接待考察团。请你给 Mr.Brown 写一封自荐信，内容包括： 个人优势：① 熟知&quot;智慧校园&quot;，如师生能在教室上网；② 乐于交流；③ 擅长英语；④ ＿＿＿； 期待的收获； 希望获得机会。 注意： 词数为 80 左右（开头和结尾已给出，不计入总词数）； 要点齐全，可适当增加细节； 不得出现真实姓名和校名； 条理清楚，语句通顺，意义连贯，书写规范。 参考词汇：智慧校园 Smart Campus 上网 surf the internet Dear Mr. Brown, I am Li Hua. I am writing to apply to work as a volunteer to show the visitors from New Zealand around our campus. Thank you. Yours, Li Hua", "", 0, "英语_2023"], [2024, "信息匹配31-35", "阅读理解", "易", "信息匹配、细节理解、问题与建议对应", "A. Use a note or a watch to remind yourself to be punctual. Write down how late you usually are, 10 or 15 minutes? Then do things 10 or 15 minutes ahead of time.\n　　B. No one can do two things well at the same time. You&#x27;d better change your way of studying and try to focus on one thing at a time.\n　　C. Create to-do lists. At the beginning of the day, make a list of the tasks you must do. Write down the most important task at the top of the list.\n　　D. By balancing study and rest, you can do more with less. Take a break after finishing a task. You can try listening to music or doing some exercise to relax. E. When you start doing homework, ask your family to turn off the TV and let your family know that you need a quiet environment to study. F. Joining a study group and having a study partner are good ways to avoid procrastination (拖延). In study groups, students can remind each other to finish their homework on time. \n31．Grace likes filling her day with study and all kinds of clubs, so her schedule is so full that she doesn&#x27;t have enough rest time and often feels very tired. \n32．Tina gets used to finishing tasks in the last second. For example, she knew there would be an exam in a month but she didn&#x27;t prepare for it until last week. \n33．Tim always spends much time on unimportant things such as playing games. Therefore, he has less time for his hobbies. \n34．Tom often does more than two tasks at the same time, because he thinks it can save time. But in fact, it usually takes him more time to finish his homework. \n35．Alice is always unpunctual (不守时), such as being late for a friend&#x27;s birthday party or an important event. She doesn&#x27;t know how to get rid of this bad habit.", "", 6, "英语_2024"]], "hovertemplate": "<b>%{customdata[0]}年 · %{customdata[1]}题</b><br>%{customdata[2]}　难度：%{customdata[3]}<br>知识点：%{customdata[4]}<extra></extra>"}];
const isDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
const layout={
  margin:{l:10,r:10,t:10,b:10}, hovermode:'closest', dragmode:'pan',
  xaxis:{visible:false}, yaxis:{visible:false},
  paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)',
  font:{color:isDark?'#e6edf3':'#1c2128', family:'-apple-system,PingFang SC,sans-serif'},

};
Plotly.newPlot('plot',TRACES,layout,{responsive:true,displayModeBar:false,scrollZoom:true});
const dmeta=document.getElementById('dmeta'), dkps=document.getElementById('dkps'), dbox=document.getElementById('dbox');
const lb=document.getElementById('lightbox'), lbimg=document.getElementById('lbimg');
function openLB(src){ if(!src) return; lbimg.src=src; lb.classList.add('open'); lb.scrollTop=0; }
function closeLB(){ lb.classList.remove('open'); lbimg.removeAttribute('src'); }
lb.addEventListener('click', closeLB);
// 全屏 PDF 浮窗：在试卷中看该题（含材料），PDF 走 Cloudflare R2
const pdfbox=document.getElementById('pdfbox'), pdfv=document.getElementById('pdfv'), pdfbtn=document.getElementById('pdfbtn'), pdftitle=document.getElementById('pdftitle');
let curPage=0, curPaper='';
function openPDF(){ if(!curPage||!curPaper) return; pdftitle.textContent=curPaper.replace('_','年 ')+'卷 · 第 '+curPage+' 页'; pdfv.src='https://pub-e7f17b08dc9449eb886cc12ad017ddc0.r2.dev/v1/%E9%A2%98%E6%BA%90/'+encodeURIComponent(curPaper)+'.pdf#page='+curPage+'&view=FitH&_='+Date.now(); pdfbox.classList.add('open'); }
function closePDF(){ pdfbox.classList.remove('open'); pdfv.removeAttribute('src'); }
pdfbtn.addEventListener('click', openPDF);
document.getElementById('pdfx').addEventListener('click', closePDF);

const PACKURL='https://pub-e7f17b08dc9449eb886cc12ad017ddc0.r2.dev/v1/%E9%A2%98%E5%9B%BE%E5%8C%85/'+encodeURIComponent('英语')+'.json';
let PACK=null, packState=0; const waiters=[];   // 0未载/1载入中/2成功/3失败
function ensurePack(cb){
  if(packState===2||packState===3){cb();return;}
  waiters.push(cb);
  if(packState===0){ packState=1;
    fetch(PACKURL).then(r=>r.ok?r.json():Promise.reject()).then(d=>{PACK=d;packState=2;})
      .catch(()=>{packState=3;}).finally(()=>{waiters.splice(0).forEach(f=>f());});
  }
}
let curImg=null, curKey=null;
function setText(t){ curImg=null; dbox.innerHTML='<div class="q">'+t+'</div>'; dbox.scrollTop=0; }
function show(pt){
  const d=pt.customdata, key=d[0]+'/'+d[1];
  if(key===curKey) return;              // 同一题重复 hover 不刷新，减少抖动
  curKey=key;
  curPage=d[7]||0; curPaper=d[8]||'';   // 该题在试卷 PDF 的页码/卷标识
  pdfbtn.disabled=!(curPage&&curPaper);
  dmeta.textContent=d[0]+'年 · 第'+d[1]+'题 · '+d[2]+' · 难度'+d[3];
  dkps.innerHTML=(d[4]||'').split('、').filter(Boolean).map(k=>'<span class="kp">'+k+'</span>').join('');
  if(d[6]){
    if(packState!==2 && !curImg) dbox.innerHTML='<span class="ph">载入原题截图…</span>';
    ensurePack(()=>{ if(curKey!==key) return; const uri=PACK&&PACK[d[6]];
      if(uri){
        if(!curImg){ dbox.innerHTML=''; curImg=document.createElement('img'); curImg.className='qimg'; curImg.alt='原题截图'; curImg.title='点击放大'; curImg.onclick=function(){openLB(curImg.src);}; dbox.appendChild(curImg); }
        curImg.src=uri; dbox.scrollTop=0;          // 只换 src，容器高度固定，整页不跳
      } else setText(d[5]||'（截图缺失）');
    });
  } else setText(d[5]);
}
const gd=document.getElementById('plot');
gd.on('plotly_click',e=>{if(e.points&&e.points[0])show(e.points[0]);});
gd.on('plotly_hover',e=>{if(e.points&&e.points[0])show(e.points[0]);});
</script></body></html>
